name: MLB Mega Scout

on:
  schedule:
    - cron: '0 17 * * *'   # 1PM ET
    - cron: '0 22 * * *'   # 6PM ET
    - cron: '0 3 * * *'    # 11PM ET
  workflow_dispatch:
    inputs:
      job:
        description: 'scout or clv_tracker'
        required: true
        default: 'scout'
        type: choice
        options: [scout, clv_tracker]

jobs:
  scout:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scout') ||
      (github.event_name == 'schedule' && (github.event.schedule == '0 17 * * *' || github.event.schedule == '0 22 * * *'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install anthropic requests pytz

      - name: Run Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scout.py

      - name: Commit JSON outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json clv_log.json bankroll.json bet_history.json model_lessons.json || true
          git diff --staged --quiet || git commit -m "Scout update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  clv_tracker:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'clv_tracker') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install anthropic requests pytz

      - name: Run CLV Tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python clv_tracker.py

      - name: Commit JSON outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add clv_log.json bankroll.json bet_history.json model_lessons.json || true
          git diff --staged --quiet || git commit -m "CLV update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
