name: Parlay OS — All Systems

on:
  schedule:
    - cron: '0 17 * * *'     # Scout 1PM ET (17 UTC)
    - cron: '0 22 * * *'     # Scout 6PM ET (reload)
    - cron: '30 21 * * *'    # Line movement check 5:30PM ET
    - cron: '0 23 * * *'     # Live monitor 7PM ET
    - cron: '30 0 * * *'     # Live monitor 8:30PM ET
    - cron: '0 2 * * *'      # Live monitor 10PM ET
    - cron: '0 3 * * *'      # CLV tracker 11PM ET
    - cron: '30 3 * * *'     # Nightly debrief 11:30PM ET
    - cron: '0 13 * * 1'     # Weekly ROI report Monday 9AM ET
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'scout'
        type: choice
        options:
          - scout
          - live
          - clv_tracker
          - debrief
          - weekly_roi

jobs:

  # ─── BRAIN SCOUT ─────────────────────────────────────────────────────────
  scout:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scout') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 17 * * *' ||
        github.event.schedule == '0 22 * * *' ||
        github.event.schedule == '30 21 * * *'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install requests pytz flask flask-cors

      - name: Run Brain Scout
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py

      - name: Commit outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "Scout: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── LIVE MONITOR ────────────────────────────────────────────────────────
  live_monitor:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'live') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 23 * * *' ||
        github.event.schedule == '30 0 * * *' ||
        github.event.schedule == '0 2 * * *'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install requests pytz flask flask-cors

      - name: Run Live Monitor
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 70m python brain.py --live || true

      - name: Commit outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add parlay_os.db || true
          git diff --staged --quiet || git commit -m "Live: monitor run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── CLV TRACKER ─────────────────────────────────────────────────────────
  clv_tracker:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'clv_tracker') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install anthropic requests pytz

      - name: Run CLV Tracker
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python clv_tracker.py

      - name: Commit outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add clv_log.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "CLV: nightly resolve $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── NIGHTLY DEBRIEF ─────────────────────────────────────────────────────
  debrief:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'debrief') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install requests pytz flask flask-cors

      - name: Run Debrief via Brain
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --debrief || true

      - name: Commit resolved bets
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add parlay_os.db clv_log.json || true
          git diff --staged --quiet || git commit -m "Debrief: bets resolved $(date -u '+%Y-%m-%d')"
          git push || true

  # ─── WEEKLY ROI REPORT ───────────────────────────────────────────────────
  weekly_roi:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'weekly_roi') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install requests pytz flask flask-cors

      - name: Run Weekly ROI Report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --weekly || true
