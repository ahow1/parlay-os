name: Parlay OS — All Systems

on:
  schedule:
    - cron: '0 15 * * *'     # day_brain      — 11am ET (15:00 UTC): day games before 3pm ET
    - cron: '0 20 * * *'     # evening_brain  — 4pm ET (20:00 UTC): evening games 3–8pm ET
    - cron: '30 23 * * *'    # west_brain     — 6:30pm ET (23:30 UTC): west coast games 8pm+ ET
    - cron: '30 22 * * *'    # line_movement  — 5:30pm ET (22:30 UTC)
    - cron: '*/5 23 * * *'   # live_engine    — 6–7pm ET (23:00–23:55 UTC), every 5 min
    - cron: '*/5 0-3 * * *'  # live_engine    — 7pm–11pm ET (00:00–03:55 UTC), every 5 min
    - cron: '30 4 * * *'     # daily_debrief  — 11:30pm ET (04:30 UTC)
    - cron: '0 14 * * 1'     # weekly_roi     — Mon 9am ET (14:00 UTC)
    - cron: '0 14 * * 0,2,3,4,5,6'  # morning_planner — 9am ET, every day except Monday
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'daily_brain'
        type: choice
        options:
          - daily_brain
          - daily_brain_day
          - daily_brain_evening
          - daily_brain_west
          - line_movement
          - live_engine
          - daily_debrief
          - weekly_roi
          - morning_planner

# ─── SHARED SETUP ─────────────────────────────────────────────────────────────
# Each job installs deps, runs ONE brain.py flag, commits if outputs changed,
# then exits. No job triggers another job. No job runs twice per schedule period.

jobs:

  # ─── 1a. DAY GAMES SCOUT — 11am ET (day games before 3pm ET) ────────────
  daily_brain_day:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_brain_day') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run day scout (games before 3pm ET)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_OVERRIDE:    ${{ secrets.BANKROLL_OVERRIDE }}
        run: python brain.py --window day

      - name: Commit scout outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json props_output.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "Scout: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 1b. EVENING GAMES SCOUT — 4pm ET (games 3–8pm ET) ──────────────────
  daily_brain_evening:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_brain_evening') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run evening scout (games 3–8pm ET)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_OVERRIDE:    ${{ secrets.BANKROLL_OVERRIDE }}
        run: python brain.py --window evening

      - name: Commit scout outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json props_output.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "Scout: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 1c. WEST COAST SCOUT — 6:30pm ET (games after 8pm ET) ──────────────
  daily_brain_west:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_brain_west') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 23 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run west coast scout (games after 8pm ET)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_OVERRIDE:    ${{ secrets.BANKROLL_OVERRIDE }}
        run: python brain.py --window west

      - name: Commit scout outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json props_output.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "Scout: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 1d. MANUAL FULL SCOUT — all games (workflow_dispatch only) ──────────
  daily_brain:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_brain'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run full scout (all games, window=all)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_OVERRIDE:    ${{ secrets.BANKROLL_OVERRIDE }}
        run: python brain.py --window all

      - name: Commit scout outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json props_output.json parlay_os.db || true
          git diff --staged --quiet || git commit -m "Scout: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 2. LINE MOVEMENT CHECK — 5:30pm ET ──────────────────────────────────
  line_movement:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'line_movement') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run line movement check
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --linecheck

      - name: Commit if scout updated
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add last_scout.json || true
          git diff --staged --quiet || git commit -m "Linecheck: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 3. LIVE ENGINE — every 5 min, 6pm–11pm ET ───────────────────────────
  live_engine:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'live_engine') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '*/5 23 * * *' ||
        github.event.schedule == '*/5 0-3 * * *'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 6
    concurrency:
      group: live_engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run live engine (single pass)
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: timeout 5m python brain.py --live || true

      - name: Commit live outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add parlay_os.db live_alerts.json || true
          git diff --staged --quiet || git commit -m "Live: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ─── 4. DAILY DEBRIEF — 11:30pm ET ───────────────────────────────────────
  daily_debrief:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_debrief') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run daily debrief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --debrief

      - name: Commit debrief outputs
        run: |
          git config user.name "Parlay OS Bot"
          git config user.email "bot@parlay-os.com"
          git add parlay_os.db clv_log.json || true
          git diff --staged --quiet || git commit -m "Debrief: $(date -u '+%Y-%m-%d')"
          git push || true

  # ─── 5. WEEKLY ROI REPORT — Monday 9am ET ────────────────────────────────
  weekly_roi:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'weekly_roi') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 1')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run weekly ROI report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --weekly

  # ─── 6. MORNING PLANNER — 9am ET (only if games + edge > 4%) ─────────────
  morning_planner:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning_planner') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 0,2,3,4,5,6')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -q requests pytz flask flask-cors

      - name: Run morning planner
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brain.py --planner
