<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Parlay OS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--card:#181c26;--border:#232840;--green:#00d68f;--green-dim:rgba(0,214,143,0.12);--amber:#ffb800;--amber-dim:rgba(255,184,0,0.12);--red:#ff4757;--red-dim:rgba(255,71,87,0.12);--blue:#4d8eff;--blue-dim:rgba(77,142,255,0.12);--text:#e8eaf0;--text2:#8b91a8;--text3:#4a5068;--disp:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--header-h:56px;--tabs-h:44px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:var(--body);color:var(--text);overflow:hidden;}
::-webkit-scrollbar{display:none;}
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;}
.logo{font-family:var(--disp);font-size:22px;font-weight:900;letter-spacing:3px;color:var(--green);}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.hdr-date{font-size:11px;color:var(--text2);}
.hdr-br{font-family:var(--disp);font-size:18px;font-weight:800;letter-spacing:1px;}
.tabs{position:fixed;top:var(--header-h);left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;z-index:99;overflow-x:auto;padding:0 4px;}
.tab{flex-shrink:0;padding:0 14px;height:var(--tabs-h);display:flex;align-items:center;gap:5px;font-family:var(--disp);font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.pages{position:fixed;top:calc(var(--header-h) + var(--tabs-h));bottom:0;left:0;right:0;overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;padding:12px 12px 24px;animation:fadeIn 0.2s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.section-label{font-family:var(--disp);font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text3);margin:14px 4px 7px;text-transform:uppercase;}
.verdict-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.vdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite;}
.vdot.green{background:var(--green);}.vdot.amber{background:var(--amber);}.vdot.red{background:var(--red);}
.vtext{font-family:var(--disp);font-size:19px;font-weight:800;letter-spacing:1px;}
.vnote{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;}
.refresh-btn{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.refresh-btn.spin{animation:spin 0.8s linear infinite;}
.game-row{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;}
.game-row.lock{border-left:3px solid var(--green);}
.game-row.cf{border-left:3px solid var(--amber);}
.game-row.pass{border-left:3px solid var(--border);opacity:0.6;}
.game-main{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.game-teams{flex:1;}
.matchup{font-family:var(--disp);font-size:21px;font-weight:800;letter-spacing:0.5px;line-height:1.1;}
.away-t{color:var(--text2);}.home-t{color:var(--text);}.at-sym{color:var(--text3);font-size:14px;margin:0 3px;}
.game-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.game-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.score-n{font-family:var(--disp);font-size:32px;font-weight:900;line-height:1;}
.score-s{font-size:9px;color:var(--text3);letter-spacing:1px;font-weight:700;}
.tag-badge{padding:2px 8px;border-radius:20px;font-family:var(--disp);font-size:11px;font-weight:800;letter-spacing:1px;}
.tag-badge.lock{background:var(--green-dim);color:var(--green);}
.tag-badge.cf{background:var(--amber-dim);color:var(--amber);}
.tag-badge.pass{background:rgba(255,255,255,0.05);color:var(--text3);}
.game-strip{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2);}
.pick-main{font-family:var(--disp);font-size:15px;font-weight:800;letter-spacing:0.5px;}
.pick-sub{font-size:10px;color:var(--text2);margin-top:1px;}
.ev-pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--disp);letter-spacing:0.5px;}
.ev-pill.pos{background:var(--green-dim);color:var(--green);}
.ev-pill.neg{background:var(--red-dim);color:var(--red);}
.ev-pill.neu{background:var(--blue-dim);color:var(--blue);}
.game-detail{display:none;padding:0 14px 12px;border-top:1px solid var(--border);}
.game-detail.open{display:block;}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.sp-box{background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;}
.sp-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-weight:700;margin-bottom:4px;}
.sp-name{font-family:var(--disp);font-size:16px;font-weight:700;}
.sp-era{font-size:12px;margin-top:2px;font-weight:600;}
.odds-row{display:flex;gap:8px;margin:8px 0;}
.odds-box{flex:1;background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;text-align:center;}
.odds-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-weight:700;margin-bottom:4px;}
.odds-val{font-family:var(--disp);font-size:24px;font-weight:900;}
.odds-impl{font-size:10px;color:var(--text2);margin-top:2px;}
.analysis-text{font-size:12px;color:var(--text2);line-height:1.6;margin:10px 0 8px;}
.edge-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.edge-item{font-size:11px;padding-left:10px;border-left:2px solid var(--green);color:var(--text);line-height:1.4;}
.risk-item{font-size:11px;padding-left:10px;border-left:2px solid var(--amber);color:var(--text2);line-height:1.4;}
.bet-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.bet-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--disp);letter-spacing:0.5px;border:1px solid;}
.bet-chip.f5{background:var(--blue-dim);color:var(--blue);border-color:rgba(77,142,255,0.3);}
.bet-chip.nrfi{background:var(--green-dim);color:var(--green);border-color:rgba(0,214,143,0.3);}
.bet-chip.kprop{background:var(--amber-dim);color:var(--amber);border-color:rgba(255,184,0,0.3);}
.bet-chip.total{background:rgba(168,85,247,0.12);color:#c084fc;border-color:rgba(168,85,247,0.3);}
.picks-section{margin-bottom:14px;}
.picks-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;}
.picks-title{font-family:var(--disp);font-size:16px;font-weight:800;letter-spacing:1px;}
.picks-count{margin-left:auto;font-size:11px;color:var(--text3);font-weight:600;}
.pick-item{background:var(--card);border:1px solid var(--border);border-top:none;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.pick-item:last-child{border-radius:0 0 10px 10px;}
.pick-num{font-family:var(--disp);font-size:13px;font-weight:800;color:var(--text3);width:20px;}
.pick-info{flex:1;}
.pick-name{font-family:var(--disp);font-size:17px;font-weight:800;letter-spacing:0.5px;}
.pick-game{font-size:11px;color:var(--text2);margin-top:2px;}
.pick-odds-badge{font-family:var(--disp);font-size:16px;font-weight:800;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);}
.parlay-card{background:var(--card);border:1px solid var(--blue);border-radius:12px;padding:16px;margin-bottom:12px;}
.parlay-title{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--blue);letter-spacing:2px;margin-bottom:12px;}
.parlay-leg{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.parlay-leg:last-of-type{border-bottom:none;}
.parlay-leg-num{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--blue);width:16px;}
.parlay-leg-name{flex:1;font-family:var(--disp);font-size:15px;font-weight:700;}
.parlay-leg-odds{font-family:var(--disp);font-size:14px;font-weight:800;color:var(--text2);}
.parlay-result{margin-top:12px;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;display:flex;align-items:center;justify-content:space-between;}
.parlay-combined{font-family:var(--disp);font-size:32px;font-weight:900;color:var(--green);}
.payout-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-weight:700;}
.payout-val{font-family:var(--disp);font-size:20px;font-weight:800;}
.br-hero{background:linear-gradient(135deg,#0d1f12 0%,#0d0f14 60%);border:1px solid rgba(0,214,143,0.2);border-radius:16px;padding:20px;margin-bottom:12px;text-align:center;}
.br-lbl{font-size:11px;color:var(--text3);letter-spacing:2px;font-weight:700;margin-bottom:6px;}
.br-amount{font-family:var(--disp);font-size:52px;font-weight:900;color:var(--green);letter-spacing:2px;line-height:1;}
.br-pnl{font-family:var(--disp);font-size:20px;font-weight:700;margin-top:6px;}
.br-sessions{font-size:11px;color:var(--text3);margin-top:4px;}
.stakes-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.stakes-title{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:2px;margin-bottom:12px;}
.stake-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.stake-row:last-child{border-bottom:none;}
.stake-type{font-family:var(--disp);font-size:15px;font-weight:700;}
.stake-desc{font-size:11px;color:var(--text3);margin-top:1px;}
.stake-amount{font-family:var(--disp);font-size:24px;font-weight:900;}
.conf-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.conf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.conf-lbl{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:2px;}
.conf-score{font-family:var(--disp);font-size:28px;font-weight:900;}
.conf-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.conf-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));transition:width 0.5s ease;}
.conf-verdict{font-size:12px;color:var(--text2);}
.clv-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.clv-main{text-align:center;margin-bottom:16px;}
.clv-pct{font-family:var(--disp);font-size:56px;font-weight:900;letter-spacing:2px;line-height:1;}
.clv-pct-lbl{font-size:11px;letter-spacing:2px;color:var(--text3);font-weight:700;margin-top:4px;}
.clv-verdict-txt{font-size:13px;color:var(--text2);margin-top:8px;}
.clv-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.clv-stat{background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;text-align:center;}
.clv-stat-val{font-family:var(--disp);font-size:22px;font-weight:900;}
.clv-stat-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;font-weight:700;margin-top:2px;}
.clv-type-box{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.clv-type-header{padding:11px 14px;font-family:var(--disp);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:2px;border-bottom:1px solid var(--border);}
.clv-type-row{padding:12px 14px;display:flex;align-items:center;border-bottom:1px solid var(--border);}
.clv-type-row:last-child{border-bottom:none;}
.clv-type-name{font-family:var(--disp);font-size:16px;font-weight:700;width:80px;}
.clv-bar-wrap{flex:1;margin:0 12px;}
.clv-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.clv-bar-fill{height:100%;border-radius:2px;}
.clv-type-stats{text-align:right;}
.clv-type-pct{font-family:var(--disp);font-size:16px;font-weight:800;}
.clv-type-wr{font-size:10px;color:var(--text3);margin-top:1px;}
.clv-bet-list{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.clv-bet-header{padding:11px 14px;font-family:var(--disp);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:2px;border-bottom:1px solid var(--border);}
.clv-bet-row{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.clv-bet-row:last-child{border-bottom:none;}
.clv-result{font-family:var(--disp);font-size:13px;font-weight:800;width:18px;}
.clv-result.w{color:var(--green);}.clv-result.l{color:var(--red);}.clv-result.p{color:var(--text3);}
.clv-bet-info{flex:1;}
.clv-bet-name{font-family:var(--disp);font-size:15px;font-weight:700;}
.clv-bet-date{font-size:10px;color:var(--text3);margin-top:1px;}
.clv-bet-clv{font-family:var(--disp);font-size:15px;font-weight:800;}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.hist-header{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.hist-date{font-family:var(--disp);font-size:15px;font-weight:800;}
.hist-record{font-family:var(--disp);font-size:13px;font-weight:700;margin-left:auto;}
.hist-pnl{font-family:var(--disp);font-size:13px;font-weight:700;}
.hist-bet{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.hist-bet:last-child{border-bottom:none;}
.hist-result{font-family:var(--disp);font-size:13px;font-weight:800;width:18px;}
.hist-bet-name{flex:1;font-size:13px;font-weight:500;}
.hist-bet-odds{font-family:var(--disp);font-size:14px;font-weight:700;color:var(--text2);}
.hist-lesson{background:rgba(255,184,0,0.06);border-top:1px solid rgba(255,184,0,0.15);padding:10px 14px;font-size:11px;color:var(--amber);line-height:1.5;}
.debrief-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.debrief-item{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.6;}
.debrief-item:last-child{border-bottom:none;}
.debrief-item.good{border-left:3px solid var(--green);}
.debrief-item.bad{border-left:3px solid var(--red);}
.debrief-item.miss{border-left:3px solid var(--amber);}
.debrief-item.neutral{border-left:3px solid var(--border);}
.lesson-card{background:rgba(255,184,0,0.08);border:1px solid rgba(255,184,0,0.2);border-radius:12px;padding:16px;margin-bottom:8px;}
.lesson-title{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--amber);letter-spacing:2px;margin-bottom:8px;}
.focus-card{background:rgba(77,142,255,0.08);border:1px solid rgba(77,142,255,0.2);border-radius:12px;padding:16px;margin-bottom:8px;}
.focus-title{font-family:var(--disp);font-size:11px;font-weight:800;color:var(--blue);letter-spacing:2px;margin-bottom:8px;}
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-family:var(--disp);font-size:22px;font-weight:800;letter-spacing:1px;margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--text2);line-height:1.6;}
.loading-state{text-align:center;padding:48px 20px;}
.loading-icon{font-size:32px;animation:spin 1s linear infinite;}
.loading-text{font-size:12px;color:var(--text2);margin-top:12px;}
.error-card{background:var(--red-dim);border:1px solid var(--red);border-radius:12px;padding:14px;font-size:12px;line-height:1.6;color:var(--text);}
</style>
</head>
<body>

<div class="header">
  <div class="logo">PARLAY OS</div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdrDate">—</div>
    <div class="hdr-br" id="hdrBr" style="color:var(--green)">$100.00</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="today" onclick="switchTab('today')">⚾ TODAY</div>
  <div class="tab" data-tab="picks" onclick="switchTab('picks')">🎯 PICKS</div>
  <div class="tab" data-tab="bankroll" onclick="switchTab('bankroll')">💰 BANKROLL</div>
  <div class="tab" data-tab="clv" onclick="switchTab('clv')">📈 CLV</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">📋 HISTORY</div>
  <div class="tab" data-tab="debrief" onclick="switchTab('debrief')">🧠 DEBRIEF</div>
</div>

<div class="pages">
  <div class="page active" id="page-today"><div id="today-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading today's slate...</div></div></div></div>
  <div class="page" id="page-picks"><div id="picks-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading picks...</div></div></div></div>
  <div class="page" id="page-bankroll"><div id="bankroll-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading bankroll...</div></div></div></div>
  <div class="page" id="page-clv"><div id="clv-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading CLV data...</div></div></div></div>
  <div class="page" id="page-history"><div id="history-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading history...</div></div></div></div>
  <div class="page" id="page-debrief"><div id="debrief-c"><div class="loading-state"><div class="loading-icon">⟳</div><div class="loading-text">Loading debrief...</div></div></div></div>
</div>

<script>
const GH_USER="ahow1",GH_REPO="parlay-os";
const raw=p=>`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${p}?t=${Date.now()}`;
let scout=null,bankroll=null,clvLog=[],betHistory={},lessons=[];

const iP=ml=>{const n=parseFloat(ml);if(!n||isNaN(n))return null;return n>0?100/(n+100):Math.abs(n)/(Math.abs(n)+100);};
const dO=ml=>{const n=parseFloat(ml);if(!n||isNaN(n))return null;return n>0?n/100+1:100/Math.abs(n)+1;};
const aO=d=>d>=2?`+${Math.round((d-1)*100)}`:`${Math.round(-100/(d-1))}`;
const sC=s=>s>=70?'var(--green)':s>=50?'var(--amber)':s>=35?'#ff9500':'var(--red)';
const sT=s=>s>=70?'lock':s>=50?'cf':'pass';
const sL=s=>s>=70?'LOCK':s>=50?'COIN FLIP':'PASS';
const eC=e=>{const n=parseFloat(e);return n<2.5?'var(--green)':n<3.5?'var(--blue)':n<5?'var(--amber)':'var(--red)';};

function cEV(po,oo){const pI=iP(po),oI=iP(oo);if(!pI||!oI)return null;const tot=pI+oI,tp=pI/tot,dec=dO(po);const ev=(tp*(dec-1)-(1-tp))*100,edge=(tp-pI)*100;return{ev:ev.toFixed(0),edge:edge.toFixed(1)};}
function cCLV(bo,co){const bp=iP(bo),cp=iP(co);if(!bp||!cp)return null;return((bp-cp)/cp*100).toFixed(2);}
function pCalc(mls){const vs=mls.map(m=>dO(m)).filter(Boolean);if(vs.length<2)return null;const d=vs.reduce((a,b)=>a*b,1);return{amer:aO(d),p15:((d-1)*15).toFixed(2),p25:((d-1)*25).toFixed(2)};}

function calcCLVStats(){
  const res=clvLog.filter(b=>b.closing_odds&&b.bet_odds&&['W','L','P'].includes(b.result));
  if(!res.length)return null;
  const clvs=res.map(b=>parseFloat(cCLV(b.bet_odds,b.closing_odds))).filter(v=>!isNaN(v));
  const wins=res.filter(b=>b.result==='W').length,losses=res.filter(b=>b.result==='L').length;
  const avg=clvs.length?clvs.reduce((a,b)=>a+b,0)/clvs.length:0;
  let units=0;res.forEach(b=>{const d=dO(b.bet_odds)||1;if(b.result==='W')units+=d-1;else if(b.result==='L')units-=1;});
  const byType={};
  res.forEach(b=>{const t=b.type||'ML';if(!byType[t])byType[t]={wins:0,losses:0,clvs:[]};if(b.result==='W')byType[t].wins++;if(b.result==='L')byType[t].losses++;const c=parseFloat(cCLV(b.bet_odds,b.closing_odds));if(!isNaN(c))byType[t].clvs.push(c);});
  return{total:res.length,wins,losses,avg:avg.toFixed(2),winRate:res.length?(wins/res.length*100).toFixed(1):0,units:units.toFixed(2),byType,verdict:avg>3?'SHARP — proven edge':avg>1?'POSITIVE — beating market':avg>-1?'NEUTRAL — even with market':'NEGATIVE — model needs work',color:avg>1?'var(--green)':avg>-1?'var(--amber)':'var(--red)'};
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===`page-${tab}`));
  ({today:renderToday,picks:renderPicks,bankroll:renderBankroll,clv:renderCLV,history:renderHistory,debrief:renderDebrief})[tab]?.();
}

async function fetchAll(){
  const r=await Promise.allSettled([fetch(raw('last_scout.json')).then(r=>r.json()),fetch(raw('bankroll.json')).then(r=>r.json()),fetch(raw('clv_log.json')).then(r=>r.json()),fetch(raw('bet_history.json')).then(r=>r.json()),fetch(raw('model_lessons.json')).then(r=>r.json())]);
  if(r[0].status==='fulfilled')scout=r[0].value;
  if(r[1].status==='fulfilled')bankroll=r[1].value;
  if(r[2].status==='fulfilled')clvLog=r[2].value||[];
  if(r[3].status==='fulfilled')betHistory=r[3].value||{};
  if(r[4].status==='fulfilled')lessons=r[4].value||[];
}

function renderCLV(){
  const el=document.getElementById('clv-c');
  const stats=calcCLVStats();
  if(!stats||!stats.total){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">NO CLV DATA YET</div><div class="empty-sub">CLV tracks automatically after each session.<br>11PM bot resolves bets and calculates CLV.<br><br>Target: +2% avg CLV over 100+ bets.</div></div>`;return;}
  const clvC=parseFloat(stats.avg)>2?'var(--green)':parseFloat(stats.avg)>0?'var(--amber)':'var(--red)';
  let typeH='';
  Object.entries(stats.byType).forEach(([t,d])=>{const tot=d.wins+d.losses;if(!tot)return;const avg=d.clvs.length?(d.clvs.reduce((a,b)=>a+b,0)/d.clvs.length).toFixed(1):'0.0';const wr=tot?(d.wins/tot*100).toFixed(0):0;const bp=Math.min(Math.max((parseFloat(avg)+10)/20*100,0),100);const bc=parseFloat(avg)>0?'var(--green)':'var(--red)';typeH+=`<div class="clv-type-row"><div class="clv-type-name">${t}</div><div class="clv-bar-wrap"><div class="clv-bar"><div class="clv-bar-fill" style="width:${bp}%;background:${bc}"></div></div></div><div class="clv-type-stats"><div class="clv-type-pct" style="color:${bc}">${parseFloat(avg)>0?'+':''}${avg}%</div><div class="clv-type-wr">${d.wins}W-${d.losses}L · ${wr}%</div></div></div>`;});
  const recent=[...clvLog].reverse().slice(0,20);
  let betsH=recent.map(b=>{const r=b.result||'?';const clv=b.closing_odds&&b.bet_odds?parseFloat(cCLV(b.bet_odds,b.closing_odds)):null;const cs=clv!==null?`${clv>0?'+':''}${clv.toFixed(1)}%`:'—';const cc=clv!==null?(clv>0?'var(--green)':'var(--red)'):'var(--text3)';return`<div class="clv-bet-row"><div class="clv-result ${r.toLowerCase()}">${r==='W'?'W':r==='L'?'L':r==='P'?'P':'?'}</div><div class="clv-bet-info"><div class="clv-bet-name">${b.bet||'—'}</div><div class="clv-bet-date">${b.date||''} · ${b.bet_odds||''} → ${b.closing_odds||'pending'}</div></div><div class="clv-bet-clv" style="color:${cc}">${cs}</div></div>`;}).join('');
  el.innerHTML=`<div class="clv-hero"><div class="clv-main"><div class="clv-pct" style="color:${clvC}">${parseFloat(stats.avg)>0?'+':''}${stats.avg}%</div><div class="clv-pct-lbl">AVERAGE CLOSING LINE VALUE</div><div class="clv-verdict-txt">${stats.verdict}</div></div><div class="clv-stats-row"><div class="clv-stat"><div class="clv-stat-val">${stats.total}</div><div class="clv-stat-lbl">BETS</div></div><div class="clv-stat"><div class="clv-stat-val">${stats.winRate}%</div><div class="clv-stat-lbl">WIN RATE</div></div><div class="clv-stat"><div class="clv-stat-val" style="color:${parseFloat(stats.units)>=0?'var(--green)':'var(--red)'}">${parseFloat(stats.units)>=0?'+':''}${stats.units}u</div><div class="clv-stat-lbl">NET UNITS</div></div></div></div>${parseFloat(stats.avg)<2&&stats.total>=10?`<div style="background:var(--amber-dim);border:1px solid var(--amber);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;line-height:1.6"><strong style="color:var(--amber)">⚠ CLV TARGET NOT YET HIT</strong><br>Target is +2% avg CLV over 100+ bets. ${stats.total<100?`${stats.total} bets tracked — need ${100-stats.total} more.`:'Model needs adjustment.'}</div>`:''}<div class="section-label">BY BET TYPE</div><div class="clv-type-box"><div class="clv-type-header">TYPE BREAKDOWN</div>${typeH||`<div style="padding:14px;font-size:12px;color:var(--text3)">No resolved bets yet.</div>`}</div><div class="section-label">RECENT BETS</div><div class="clv-bet-list"><div class="clv-bet-header">LAST 20 BETS</div>${betsH||`<div style="padding:14px;font-size:12px;color:var(--text3)">No bets tracked yet.</div>`}</div>`;
}

  let h='';

    const sess=betHistory[date]||{},bets=sess.bets||[],summary=sess.session_summary||sess.summary||{},pnl=sess.pnl||0;
    const wins=summary.wins||bets.filter(b=>b.result==='W').length,losses=summary.losses||bets.filter(b=>b.result==='L').length;

    bets.forEach(b=>{const r=b.result||'?';const rc=r==='W'?'var(--green)':r==='L'?'var(--red)':'var(--text3)';const clv=b.closing_odds&&b.bet_odds?parseFloat(cCLV(b.bet_odds,b.closing_odds)):null;h+=`<div class="hist-bet"><div class="hist-result" style="color:${rc}">${r}</div><div class="hist-bet-name">${b.bet||'—'}${b.game_score?` · ${b.game_score}`:''}</div>${clv!==null?`<div style="font-size:11px;font-weight:700;color:${clv>0?'var(--green)':'var(--red)'}">${clv>0?'+':''}${clv.toFixed(1)}%</div>`:''}<div class="hist-bet-odds">${b.bet_odds||''}</div></div>`;});

    if(analysis.next_session_focus)h+=`<div class="focus-card"><div class="focus-title">TOMORROW'S FOCUS</div><div style="font-size:13px;line-height:1.6">${analysis.next_session_focus}</div></div>`;
  }
  if(lessons.length>1){h+=`<div class="section-label">ALL LESSONS</div><div class="debrief-card">`;[...lessons].reverse().forEach(l=>{h+=`<div class="debrief-item neutral"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">${l.date||''} · Confidence: ${l.confidence||'?'}/10</div>${l.top_lesson||''}</div>`;});h+=`</div>`;}
  el.innerHTML=h;
}

async function doRefresh(){
  const btn=document.getElementById('rfBtn');
  if(btn)btn.classList.add('spin');
  await fetchAll();
  const active=document.querySelector('.tab.active')?.dataset?.tab||'today';
  ({today:renderToday,picks:renderPicks,bankroll:renderBankroll,clv:renderCLV,history:renderHistory,debrief:renderDebrief})[active]?.();
  if(btn)btn.classList.remove('spin');
}

async function init(){
  document.getElementById('hdrDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  await fetchAll();
  renderToday();
  setInterval(async()=>{await fetchAll();const a=document.querySelector('.tab.active')?.dataset?.tab||'today';({today:renderToday,picks:renderPicks,bankroll:renderBankroll,clv:renderCLV,history:renderHistory,debrief:renderDebrief})[a]?.();},5*60*1000);
}
init();
</script>
