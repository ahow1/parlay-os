<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PARLAY OS — TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-text-size-adjust:100%;}
body{background:#00070d;color:#b8d4e8;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#040c14;}
::-webkit-scrollbar-thumb{background:#0a2a44;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,180,255,0.3);}

:root{
  --bg0:#00070d;--bg1:#040c14;--bg2:#071525;
  --border:#081828;--border2:#0d2840;
  --blue:#00b4ff;--blue2:#0066cc;--blue3:#003d7a;
  --green:#00ff88;--red:#ff3355;--amber:#ffaa00;--purple:#cc88ff;
  --t1:#b8d4e8;--t2:#4a6a8a;--t3:#1e3a52;
  --hh:56px;--th:44px;
}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:rgba(0,7,13,0.97);border-bottom:1px solid var(--border2);
  backdrop-filter:blur(12px);display:flex;align-items:center;
  padding:0 16px;gap:14px;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-mark{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--blue3),var(--blue2));
  border:1px solid rgba(0,180,255,0.25);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:10px;color:var(--blue);letter-spacing:0.5px;
}
.logo-title{font-size:12px;font-weight:700;color:#fff;letter-spacing:3.5px;line-height:1;}
.logo-sub{font-size:8px;color:var(--t2);letter-spacing:2px;margin-top:3px;}

.hdr-badges{display:flex;gap:5px;margin-left:2px;}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 7px;border-radius:3px;font-size:8px;
  font-weight:700;letter-spacing:1.5px;border:1px solid;white-space:nowrap;
}
.badge.green{background:rgba(0,255,136,0.07);border-color:rgba(0,255,136,0.25);color:var(--green);}
.badge.blue{background:rgba(0,180,255,0.07);border-color:rgba(0,180,255,0.25);color:var(--blue);}
.badge.amber{background:rgba(255,170,0,0.07);border-color:rgba(255,170,0,0.25);color:var(--amber);}
.badge.red{background:rgba(255,51,85,0.07);border-color:rgba(255,51,85,0.25);color:var(--red);}
.badge.dim{background:rgba(74,106,138,0.07);border-color:rgba(74,106,138,0.2);color:var(--t2);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.dot.blink{animation:blink 1.2s ease-in-out infinite;}

.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.hdr-bankroll{display:none;text-align:right;}
.hdr-bankroll .amount{font-size:15px;font-weight:700;color:var(--blue);}
.hdr-bankroll .label{font-size:8px;color:var(--t2);letter-spacing:1.5px;}
.refresh-btn{
  cursor:pointer;font-size:9px;color:var(--t2);letter-spacing:1.5px;
  padding:4px 10px;border:1px solid var(--border2);border-radius:3px;
  transition:all 0.15s;flex-shrink:0;background:none;font-family:inherit;
}
.refresh-btn:hover{color:var(--blue);border-color:rgba(0,180,255,0.3);}

/* ── TABS ── */
#tabs{
  position:fixed;top:var(--hh);left:0;right:0;height:var(--th);
  background:rgba(0,7,13,0.97);border-bottom:1px solid var(--border2);
  display:flex;overflow-x:auto;overflow-y:hidden;z-index:99;scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;padding:0 15px;height:var(--th);background:none;
  border:none;border-bottom:2px solid transparent;color:var(--t2);
  font-family:inherit;font-size:9px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:color 0.15s,border-color 0.15s;white-space:nowrap;
}
.tab:hover{color:var(--t1);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* ── CONTENT ── */
#content{padding-top:calc(var(--hh) + var(--th));min-height:100vh;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.page{max-width:1200px;margin:0 auto;padding:18px 14px 48px;}

/* ── NOTICE ── */
.fetch-notice{
  background:rgba(255,170,0,0.06);border:1px solid rgba(255,170,0,0.2);
  border-radius:5px;padding:10px 14px;margin-bottom:14px;
  font-size:10px;color:var(--amber);line-height:1.6;display:none;
}
.fetch-notice code{background:rgba(255,170,0,0.12);padding:1px 5px;border-radius:2px;}

/* ── SESSION BAR ── */
.session-bar{
  background:var(--bg1);border:1px solid var(--border2);border-radius:6px;
  padding:12px 14px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;
}
.s-date{font-size:10px;color:var(--t2);letter-spacing:1px;}
.s-verdict{font-size:10px;font-weight:700;letter-spacing:2px;}
.s-verdict.green{color:var(--green);}
.s-verdict.amber{color:var(--amber);}
.s-verdict.red{color:var(--red);}
.s-note{font-size:11px;color:var(--t1);flex:1;min-width:180px;}
.s-session{width:100%;font-size:9px;color:var(--t2);border-top:1px solid var(--border);padding-top:8px;margin-top:2px;}

/* ── PARLAY BAR ── */
.parlay-bar{
  background:rgba(204,136,255,0.05);border:1px solid rgba(204,136,255,0.18);
  border-radius:6px;padding:10px 14px;margin-bottom:14px;
}
.pb-label{font-size:8px;color:var(--t2);letter-spacing:2px;margin-bottom:5px;}
.pb-legs{color:var(--purple);font-weight:700;font-size:13px;}

/* ── GAME CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;}
.game-card{
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:7px;overflow:hidden;transition:border-color 0.2s;
}
.game-card:hover{border-color:rgba(0,180,255,0.3);}
.game-card.c-high{border-color:rgba(0,255,136,0.25);}
.game-card.c-medium{border-color:rgba(255,170,0,0.2);}
.game-card.c-pass{opacity:0.52;}

.card-hdr{
  display:flex;align-items:center;padding:9px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);gap:8px;
}
.matchup{flex:1;display:flex;align-items:center;gap:7px;}
.tm{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.at{font-size:11px;color:var(--t3);}
.gtime{font-size:9px;color:var(--t2);margin-left:auto;flex-shrink:0;}
.conv-badge{
  padding:3px 7px;border-radius:3px;font-size:9px;font-weight:700;
  letter-spacing:1.5px;flex-shrink:0;border:1px solid;
}
.conv-badge.high{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.35);color:var(--green);}
.conv-badge.medium{background:rgba(255,170,0,0.09);border-color:rgba(255,170,0,0.3);color:var(--amber);}
.conv-badge.pass{background:rgba(74,106,138,0.08);border-color:rgba(74,106,138,0.18);color:var(--t2);}

.card-body{padding:11px 12px;display:flex;flex-direction:column;gap:9px;}

.records{display:flex;gap:14px;font-size:10px;color:var(--t2);}
.trec{display:flex;gap:4px;align-items:center;}
.ta{color:var(--t1);font-weight:600;font-size:11px;}

/* SP ROW */
.sp-row{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center;}
.sp-card{padding:7px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;min-width:0;}
.sp-side{font-size:8px;color:var(--t3);letter-spacing:1px;margin-bottom:3px;}
.sp-name{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-stats{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;font-size:9px;color:var(--t2);}
.sp-hand{color:var(--blue);font-weight:700;}
.sp-vs{font-size:9px;color:var(--t3);text-align:center;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stat-blk{padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;}
.stat-lbl{font-size:8px;color:var(--t3);letter-spacing:1px;margin-bottom:4px;}
.stat-vals{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--t1);}

/* WIN PROB BAR */
.wp-wrap{display:flex;flex-direction:column;gap:4px;}
.wp-labels{display:flex;justify-content:space-between;font-size:10px;}
.wp-l{color:var(--t2);}
.wp-p{font-weight:600;color:var(--t1);}
.wp-bar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;display:flex;}
.wp-away{background:var(--blue2);}
.wp-home{background:var(--blue);flex:1;}

/* EDGE ROW */
.edge-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;
}
.edge-lbl{font-size:8px;color:var(--t3);letter-spacing:1px;margin-bottom:3px;}
.edge-val{font-size:15px;font-weight:700;}
.edge-val.pos{color:var(--green);}
.edge-val.neu{color:var(--amber);}
.edge-val.neg{color:var(--red);}
.mkt-col{text-align:center;font-size:10px;color:var(--t2);}
.mkt-lbl{font-size:8px;color:var(--t3);margin-bottom:2px;}
.model-col{text-align:right;font-size:10px;color:var(--t2);}

/* PICK ROW */
.pick-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border-radius:5px;border:1px solid;
}
.pr-high{background:rgba(0,255,136,0.05);border-color:rgba(0,255,136,0.2);}
.pr-medium{background:rgba(255,170,0,0.05);border-color:rgba(255,170,0,0.18);}
.pk-lbl{font-size:8px;color:var(--t2);letter-spacing:1px;margin-bottom:2px;}
.pk-team{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.pk-odds{font-size:12px;font-weight:600;color:var(--blue);margin-top:2px;}
.pk-stake{margin-left:auto;text-align:right;}
.pk-stake-amt{font-size:13px;font-weight:700;color:var(--green);}
.pk-stake-lbl{font-size:8px;color:var(--t2);margin-top:2px;}

/* NARRATIVE */
.narrative{
  font-size:11px;color:var(--t1);line-height:1.65;
  padding:9px 11px;border-left:3px solid var(--blue3);
  background:var(--bg2);border-radius:0 4px 4px 0;font-style:italic;
}
.n-high{border-left-color:rgba(0,255,136,0.5);}
.n-medium{border-left-color:rgba(255,170,0,0.45);}

/* PROP TAGS */
.prop-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ptag{font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:3px;background:var(--bg2);border:1px solid var(--border2);color:var(--t2);}
.ptag.nrfi{color:var(--purple);border-color:rgba(204,136,255,0.25);}
.ptag.total{color:var(--blue);border-color:rgba(0,180,255,0.25);}
.ptag.kprop{color:var(--amber);border-color:rgba(255,170,0,0.25);}

/* MISC ROW */
.misc-row{display:flex;flex-wrap:wrap;gap:5px 10px;font-size:9px;color:var(--t2);}
.misc-lbl{color:var(--t3);}

/* PASS LIST */
.pass-section-lbl{font-size:8px;letter-spacing:2px;color:var(--t3);margin:18px 0 8px;}
.pass-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px;}
.pass-card{padding:8px 11px;background:var(--bg1);border:1px solid var(--border);border-radius:4px;}
.pc-lbl{font-size:8px;color:var(--t3);letter-spacing:1px;margin-bottom:3px;}
.pc-mu{font-size:10px;color:var(--t1);font-weight:600;}
.pc-edge{font-size:10px;color:var(--t2);margin-top:2px;}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--blue);}
.sec-meta{font-size:9px;color:var(--t2);}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:11px;}
.dt th{
  text-align:left;padding:7px 11px;background:var(--bg2);
  border-bottom:2px solid var(--border2);color:var(--t2);
  font-size:8px;letter-spacing:1.5px;white-space:nowrap;
}
.dt td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--t1);}
.dt tr:hover td{background:var(--bg2);}
.gc{font-weight:600;color:#fff;}
.ec{font-weight:700;}
.ac{font-size:9px;color:var(--t2);max-width:180px;white-space:normal;word-break:break-word;}
.em{color:var(--green);}
.eh{color:#55ff99;}
.ea{color:var(--amber);}
.el{color:var(--t1);}

/* ── STAT CARDS ── */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.sc{background:var(--bg1);border:1px solid var(--border2);border-radius:6px;padding:13px;}
.sc .sc-lbl{font-size:8px;color:var(--t2);letter-spacing:1.5px;margin-bottom:7px;}
.sc .sc-val{font-size:22px;font-weight:700;color:var(--t1);line-height:1;}
.sc .sc-val.pos{color:var(--green);}
.sc .sc-val.neg{color:var(--red);}
.sc .sc-val.blu{color:var(--blue);}
.sc .sc-sub{font-size:9px;color:var(--t3);margin-top:4px;}

/* ── CHART CARD ── */
.chart-card{background:var(--bg1);border:1px solid var(--border2);border-radius:6px;padding:14px;margin-bottom:14px;}
.chart-title{font-size:9px;color:var(--t2);letter-spacing:1.5px;margin-bottom:12px;}
.chart-area{width:100%;height:150px;overflow:hidden;}

/* ── BANKROLL HERO ── */
.br-hero{
  background:var(--bg1);border:1px solid var(--border2);border-radius:7px;
  padding:18px;margin-bottom:14px;display:flex;flex-wrap:wrap;align-items:center;gap:18px;
}
.br-main .br-lbl{font-size:8px;color:var(--t2);letter-spacing:2px;margin-bottom:6px;}
.br-main .br-amount{font-size:34px;font-weight:700;color:var(--blue);line-height:1;}
.br-main .br-chg{font-size:12px;font-weight:600;margin-top:7px;}
.br-main .br-chg.pos{color:var(--green);}
.br-main .br-chg.neg{color:var(--red);}
.br-stats{display:flex;flex-wrap:wrap;gap:16px;}
.brs .brs-val{font-size:15px;font-weight:700;color:var(--t1);}
.brs .brs-lbl{font-size:8px;color:var(--t2);letter-spacing:1px;margin-top:3px;}

/* ── MONITOR ── */
.alert-list{display:flex;flex-direction:column;gap:9px;}
.alert-item{background:var(--bg1);border:1px solid var(--border2);border-radius:5px;padding:11px 13px;}
.ai-date{font-size:8px;color:var(--t2);letter-spacing:1px;margin-bottom:5px;}
.ai-bet{font-size:11px;color:var(--t1);font-weight:600;margin-bottom:3px;}
.ai-type{font-size:9px;color:var(--blue);letter-spacing:1px;}

/* ── PROPS ── */
.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.prop-card{background:var(--bg1);border:1px solid var(--border2);border-radius:6px;padding:13px;}
.pp-player{font-size:13px;font-weight:700;color:#fff;}
.pp-type{font-size:9px;color:var(--blue);letter-spacing:1px;margin-top:2px;}
.pp-line{font-size:15px;font-weight:700;color:var(--t1);margin-top:7px;}
.pp-rec{font-size:11px;font-weight:700;margin-top:3px;}
.pp-rec.over{color:var(--green);}
.pp-rec.under{color:var(--red);}
.pp-prob{font-size:9px;color:var(--t2);margin-top:4px;}

/* ── LOG ── */
.file-tabs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.ftab{
  padding:4px 11px;background:var(--bg1);border:1px solid var(--border2);
  border-radius:3px;font-family:inherit;font-size:9px;color:var(--t2);
  cursor:pointer;letter-spacing:1px;transition:all 0.15s;
}
.ftab:hover{color:var(--t1);}
.ftab.active{color:var(--blue);border-color:rgba(0,180,255,0.3);background:rgba(0,180,255,0.05);}
.json-display{
  background:var(--bg1);border:1px solid var(--border2);border-radius:6px;
  padding:13px;overflow:auto;max-height:calc(100vh - 200px);
  font-size:10px;line-height:1.75;color:var(--t1);white-space:pre-wrap;word-break:break-word;
}
.jk{color:var(--blue);}
.js{color:var(--green);}
.jn{color:var(--amber);}
.jb{color:var(--purple);}
.jnull{color:var(--t3);}

/* ── BET SLIP ── */
.bs-header{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg1);border:1px solid var(--border2);border-radius:6px;
  padding:12px 16px;margin-bottom:14px;}
.bs-bankroll{font-size:22px;font-weight:700;color:var(--blue);}
.bs-pnl{font-size:11px;color:var(--t2);margin-top:2px;}
.bs-api-note{font-size:9px;color:var(--t3);letter-spacing:1px;}
.slip-section{margin-bottom:20px;}
.slip-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t2);
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.slip-card{
  background:var(--bg1);border:1px solid var(--border2);border-radius:6px;
  padding:12px 14px;margin-bottom:8px;transition:border-color 0.15s;
}
.slip-card:hover{border-color:rgba(0,180,255,0.25);}
.slip-card.logged{border-color:rgba(0,255,136,0.2);background:rgba(0,255,136,0.02);}
.sc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sc-game{flex:1;font-size:13px;font-weight:700;color:#fff;}
.sc-time{font-size:9px;color:var(--t2);}
.sc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.sc-pick{font-size:11px;color:var(--amber);font-weight:700;}
.sc-odds{font-size:11px;color:var(--blue);}
.sc-edge{font-size:10px;color:var(--green);}
.sc-stake{font-size:10px;color:var(--t1);}
.sc-towin{font-size:10px;color:var(--green);}
.sc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.slip-btn{
  cursor:pointer;font-family:inherit;font-size:9px;font-weight:700;
  letter-spacing:1.5px;padding:5px 12px;border-radius:3px;border:1px solid;
  transition:all 0.15s;
}
.slip-btn.bet-btn{
  background:rgba(0,180,255,0.1);border-color:rgba(0,180,255,0.35);
  color:var(--blue);
}
.slip-btn.bet-btn:hover{background:rgba(0,180,255,0.2);}
.slip-btn.win-btn{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.35);color:var(--green);}
.slip-btn.win-btn:hover{background:rgba(0,255,136,0.25);}
.slip-btn.loss-btn{background:rgba(255,51,85,0.1);border-color:rgba(255,51,85,0.35);color:var(--red);}
.slip-btn.loss-btn:hover{background:rgba(255,51,85,0.25);}
.slip-btn.push-btn{background:rgba(74,106,138,0.1);border-color:rgba(74,106,138,0.3);color:var(--t2);}
.slip-btn.push-btn:hover{background:rgba(74,106,138,0.2);}
.slip-btn:disabled{opacity:0.4;cursor:default;}
.slip-status{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:2px 8px;border-radius:3px;}
.slip-status.win{color:var(--green);background:rgba(0,255,136,0.08);}
.slip-status.loss{color:var(--red);background:rgba(255,51,85,0.08);}
.slip-status.push{color:var(--t2);background:rgba(74,106,138,0.08);}
.slip-status.logged{color:var(--blue);background:rgba(0,180,255,0.08);}

/* ── EMPTY STATE ── */

</head>
<body>

<header id="hdr">
  <div class="logo">
    <div class="logo-mark">POS</div>
    <div>
      <div class="logo-title">PARLAY OS</div>
      <div class="logo-sub">MLB EDGE SYSTEM v4</div>
    </div>
  </div>
  <div class="hdr-badges" id="hdr-badges">
    <span class="badge dim" id="verdict-badge"><span class="dot"></span>LOADING</span>
    <span class="badge blue"><span class="dot"></span>MLB</span>
  </div>
  <div class="hdr-right">
    <span class="badge red" id="live-indicator" style="display:none;"><span class="dot blink"></span>LIVE</span>
    <div class="hdr-bankroll">
      <div class="label">BANKROLL</div>
      <div class="amount" id="hdr-br">—</div>
    </div>

  </div>
</header>

<nav id="tabs">
  <button class="tab active" data-tab="today">TODAY'S PICKS</button>
  <button class="tab" data-tab="betslip">BET SLIP</button>
  <button class="tab" data-tab="monitor">LIVE MONITOR</button>
  <button class="tab" data-tab="edges">EDGE FINDER</button>
  <button class="tab" data-tab="props">PROPS</button>
  <button class="tab" data-tab="clv">CLV</button>
  <button class="tab" data-tab="bankroll">BANKROLL</button>
  <button class="tab" data-tab="log">LOG</button>
</nav>

<main id="content">
  <div id="today"    class="tab-content active"></div>
  <div id="betslip"  class="tab-content"></div>
  <div id="monitor"  class="tab-content"></div>
  <div id="edges"    class="tab-content"></div>
  <div id="props"    class="tab-content"></div>
  <div id="clv"      class="tab-content"></div>
  <div id="bankroll" class="tab-content"></div>
  <div id="log"      class="tab-content"></div>
</main>

<script>
// ── STATE ──
const APP = {
  scout:null, arb:[], clv:[], props:null, live:[], preview:null, activeLog:'scout', START:150,
  bankroll:null, loggedBets:{},  // {game_key: {logged:bool, result:'W'/'L'/'P'/null}}
};

// API base — works when served by Flask at localhost:5000, falls back silently otherwise
const API = (()=>{
  try {
    const h = window.location.hostname;
    const p = window.location.port;
    if (h==='localhost'||h==='127.0.0.1') return `http://${h}:${p||5000}/api`;
    if (window.location.protocol!=='file:') return '/api';
  } catch(_){}
  return 'http://localhost:5000/api';
})();

async function apiGet(path) {
  try { return await fetch(API+path).then(r=>r.json()); } catch(_){ return null; }
}
async function apiPost(path, body) {
  try {
    const r = await fetch(API+path, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    return await r.json();
  } catch(e){ return {error: String(e)}; }
}

// ── FETCH ──
async function loadData() {
  // Try API first, fall back to static files
  const [scout, arb, clv, props, live, bankroll, preview] = await Promise.all([
    apiGet('/scout').then(d=>d||null).catch(()=>null)
      .then(d=>d||fetch('last_scout.json').then(r=>r.json()).catch(()=>null)),
    apiGet('/arbitrage').then(d=>d||null).catch(()=>null)
      .then(d=>d||fetch('arbitrage_log.json').then(r=>r.json()).catch(()=>[])),
    apiGet('/clv').then(d=>d||null).catch(()=>null)
      .then(d=>d||fetch('clv_log.json').then(r=>r.json()).catch(()=>[])),
    fetch('props_output.json').then(r=>r.json()).catch(()=>null),
    fetch('live_alerts.json').then(r=>r.json()).catch(()=>[]),
    apiGet('/bankroll').catch(()=>null),
    fetch('daily_preview.json').then(r=>r.json()).catch(()=>null),
  ]);
  APP.scout=scout; APP.arb=arb||[]; APP.clv=clv||[];
  APP.props=props; APP.live=live||[]; APP.bankroll=bankroll||null;
  APP.preview=preview||null;

  // Load logged bets state from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('parlayos_bets')||'{}');
    APP.loggedBets = saved;
  } catch(_){ APP.loggedBets = {}; }

  if (!scout) document.querySelectorAll('.fetch-notice').forEach(n=>n.style.display='block');
}

// ── UTILS ──
const $ = id => document.getElementById(id);
const mk = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls)              e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};

function fmtOdds(v) {
  if (v==null) return '—';
  const n = parseInt(String(v).replace(/[^\d-]/g,''));
  if (isNaN(n)) return String(v);
  return n>0 ? `+${n}` : String(n);
}
function fmtEdge(v) {
  if (v==null) return '—';
  const f = parseFloat(v);
  return `${f>=0?'+':''}${f.toFixed(1)}%`;
}
function edgeCls(p) { return p>=30?'em':p>=15?'eh':p>=5?'ea':'el'; }
function verdictInfo(v) {
  if (!v) return {cls:'dim',short:'LOADING'};
  if (v.includes('GREEN'))  return {cls:'green',short:'FULL SESSION'};
  if (v.includes('YELLOW')) return {cls:'amber',short:'SELECTIVE'};
  return {cls:'red',short:'PASS DAY'};
}
function parseBR(str) {
  if (!str) return {cur:APP.START,peak:APP.START};
  const m = str.match(/\$([\d.]+)[^$]*\$([\d.]+)/);
  if (m) return {cur:parseFloat(m[1]),peak:parseFloat(m[2])};
  const s = str.match(/\$([\d.]+)/);
  const v = s ? parseFloat(s[1]) : APP.START;
  return {cur:v,peak:v};
}
function emptyState(title, sub) {
  return mk('div','empty',`<div class="e-icon">◈</div><div class="e-title">${title}</div><div class="e-sub">${sub}</div>`);
}

// ── SVG CHART ──
function drawChart(container, points, opts={}) {
  const {color='#00b4ff', fill='rgba(0,180,255,0.07)', base=null, dots=true} = opts;
  const W=Math.max(container.offsetWidth||500,200), H=150;
  const P={t:12,r:10,b:26,l:42}, IW=W-P.l-P.r, IH=H-P.t-P.b;

  if (!points||points.length<2) {
    container.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px"><text x="${W/2}" y="${H/2+4}" text-anchor="middle" fill="#1e3a52" font-family="JetBrains Mono,monospace" font-size="11">NO DATA</text></svg>`;
    return;
  }

  const ys=points.map(p=>p.y);
  const allY=base!==null?[...ys,base]:ys;
  const minY=Math.min(...allY), maxY=Math.max(...allY);
  const pad=(maxY-minY)*0.12||1, lo=minY-pad, hi=maxY+pad;
  const px=i=>P.l+(i/(points.length-1))*IW;
  const py=y=>P.t+IH-((y-lo)/(hi-lo))*IH;

  let grid='';
  for (let i=0;i<=4;i++) {
    const yv=lo+(hi-lo)*(i/4), yp=py(yv);
    const lbl=Math.abs(yv)>=1000?(yv/1000).toFixed(1)+'k':Math.abs(yv)>=10?yv.toFixed(0):yv.toFixed(1);
    grid+=`<line x1="${P.l}" y1="${yp}" x2="${P.l+IW}" y2="${yp}" stroke="#081828" stroke-width="1"/>`;
    grid+=`<text x="${P.l-4}" y="${yp+4}" text-anchor="end" fill="#1e3a52" font-size="9" font-family="JetBrains Mono,monospace">${lbl}</text>`;
  }

  let baseLine='';
  if (base!==null) {
    const bp=py(base);
    baseLine=`<line x1="${P.l}" y1="${bp}" x2="${P.l+IW}" y2="${bp}" stroke="#0d2840" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  }

  const d=points.map((p,i)=>`${i===0?'M':'L'}${px(i)},${py(p.y)}`).join(' ');
  const fd=`${d} L${px(points.length-1)},${P.t+IH} L${P.l},${P.t+IH} Z`;

  let xLbls='';
  const n=Math.min(6,points.length);
  for (let i=0;i<n;i++) {
    const idx=Math.round(i*(points.length-1)/Math.max(n-1,1));
    xLbls+=`<text x="${px(idx)}" y="${H-4}" text-anchor="middle" fill="#1e3a52" font-size="8" font-family="JetBrains Mono,monospace">${points[idx].lbl||idx+1}</text>`;
  }

  let dotsSVG='';
  if (dots&&points.length<=50) {
    points.forEach((p,i)=>{
      const dc=base!==null?(p.y>=base?'#00ff88':'#ff3355'):color;
      dotsSVG+=`<circle cx="${px(i)}" cy="${py(p.y)}" r="3" fill="${dc}" stroke="#040c14" stroke-width="1.5"/>`;
    });
  }

  container.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px" xmlns="http://www.w3.org/2000/svg">
    ${grid}${baseLine}
    <path d="${fd}" fill="${fill}"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dotsSVG}${xLbls}
  </svg>`;
}

// ── TODAY ──
function renderToday() {
  const div=$('today');
  const page=mk('div','page fade-in');

  const notice=mk('div','fetch-notice',
    '&#9888; fetch() is blocked on file://. Serve locally: <code>python3 -m http.server 8080</code> then open localhost:8080');
  if (!APP.scout) notice.style.display='block';
  page.appendChild(notice);

  const s=APP.scout;
  if (!s) {
    page.appendChild(emptyState('NO DATA LOADED','Could not load last_scout.json. Run scout.py or serve via local HTTP server.'));
    div.innerHTML=''; div.appendChild(page); return;
  }

  const vi=verdictInfo(s.verdict);
  const vb=$('verdict-badge');
  if (vb) { vb.className=`badge ${vi.cls}`; vb.innerHTML=`<span class="dot"></span>${vi.short}`; }
  const br=parseBR(s.bankroll);
  const hbr=$('hdr-br');
  if (hbr) hbr.textContent=`$${br.cur.toFixed(2)}`;

  const sb=mk('div','session-bar');
  sb.innerHTML=`
    <span class="s-date">${s.date||'—'}</span>
    <span class="s-verdict ${vi.cls}">${s.verdict||'—'}</span>
    <span class="s-note">${s.note||''}</span>
    <span class="s-session">${s.session_note||''} &nbsp;·&nbsp; Bankroll: ${s.bankroll||'—'}</span>
  `;
  page.appendChild(sb);

  const legs=s.parlay_legs||[];
  if (legs.length>=2) {
    const pb=mk('div','parlay-bar');
    pb.innerHTML=`<div class="pb-label">PARLAY SUGGESTION</div><div class="pb-legs">${legs.join(' ＋ ')}</div>`;
    page.appendChild(pb);
  }

  const games=s.games||[];
  const active=games.filter(g=>g.conviction!=='PASS');
  const passes=games.filter(g=>g.conviction==='PASS');

  if (active.length>0) {
    const grid=mk('div','cards-grid');
    active.forEach(g=>grid.appendChild(makeGameCard(g)));
    page.appendChild(grid);
  } else if (games.length===0) {
    page.appendChild(emptyState('NO GAMES TODAY','Scout found no games. Check back after odds are posted.'));
  } else {
    page.appendChild(emptyState('PASS DAY','No games cleared the minimum edge threshold. Stay flat — no edge, no bet.'));
  }

  if (passes.length>0) {
    page.appendChild(mk('div','pass-section-lbl',`PASS — ${passes.length} GAME${passes.length!==1?'S':''} BELOW THRESHOLD`));
    const pg=mk('div','pass-grid');
    passes.forEach(g=>{
      const best=Math.max(g.home_edge||0,g.away_edge||0);
      const pc=mk('div','pass-card');
      pc.innerHTML=`<div class="pc-lbl">PASS</div><div class="pc-mu">${g.away} @ ${g.home}${g.time?' — '+g.time:''}</div><div class="pc-edge">Edge: ${fmtEdge(best)} &nbsp;·&nbsp; ${g.asp||'TBA'} vs ${g.hsp||'TBA'}</div>`;
      pg.appendChild(pc);
    });
    page.appendChild(pg);
  }

  div.innerHTML=''; div.appendChild(page);
}

function makeGameCard(g) {
  const conv=(g.conviction||'PASS').toUpperCase();
  const cc=conv==='HIGH'?'high':conv==='MEDIUM'?'medium':'pass';
  const clbl=conv==='HIGH'?'LOCK':conv==='MEDIUM'?'CF':'PASS';
  const awWP=parseFloat(g.away_wp)||0;
  const hmWP=parseFloat(g.home_wp)||0;
  const ep=parseFloat(g.edge_pct)||0;
  const ecls=ep>4?'pos':ep>0?'neu':'neg';

  const card=mk('div',`game-card c-${cc}`);
  card.innerHTML=`
    <div class="card-hdr">
      <div class="matchup">
        <span class="tm">${g.away||'—'}</span>
        <span class="at">@</span>
        <span class="tm">${g.home||'—'}</span>
        ${g.time?`<span class="gtime">${g.time}</span>`:''}
      </div>
      <span class="conv-badge ${cc}">${clbl}</span>
    </div>
    <div class="card-body">
      <div class="records">
        <div class="trec"><span class="ta">${g.away}</span>&nbsp;${g.away_record||''}</div>
        <span style="color:var(--t3)">·</span>
        <div class="trec"><span class="ta">${g.home}</span>&nbsp;${g.home_record||''}</div>
      </div>

      <div class="sp-row">
        <div class="sp-card">
          <div class="sp-side">${g.away} SP</div>
          <div class="sp-name">${g.asp||'TBA'}</div>
          <div class="sp-stats">
            <span class="sp-hand">${g.asp_hand||'R'}HP</span>
            <span>xFIP&nbsp;${g.asp_xfip||'—'}</span>
            ${g.asp_k9!=null?`<span>K/9&nbsp;${g.asp_k9}</span>`:''}
            ${g.asp_siera!=null?`<span>SIERA&nbsp;${g.asp_siera}</span>`:''}
          </div>
        </div>
        <div class="sp-vs">VS</div>
        <div class="sp-card">
          <div class="sp-side">${g.home} SP</div>
          <div class="sp-name">${g.hsp||'TBA'}</div>
          <div class="sp-stats">
            <span class="sp-hand">${g.hsp_hand||'R'}HP</span>
            <span>xFIP&nbsp;${g.hsp_xfip||'—'}</span>
            ${g.hsp_k9!=null?`<span>K/9&nbsp;${g.hsp_k9}</span>`:''}
            ${g.hsp_siera!=null?`<span>SIERA&nbsp;${g.hsp_siera}</span>`:''}
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-blk">
          <div class="stat-lbl">OFFENSE wRC+</div>
          <div class="stat-vals">
            <span>${g.away}&nbsp;${g.away_wrc_adj??g.away_wrc??'—'}</span>
            <span>${g.home}&nbsp;${g.home_wrc_adj??g.home_wrc??'—'}</span>
          </div>
        </div>
        <div class="stat-blk">
          <div class="stat-lbl">BULLPEN ERA</div>
          <div class="stat-vals">
            <span>${g.away}&nbsp;${g.away_bp_era??'—'}</span>
            <span>${g.home}&nbsp;${g.home_bp_era??'—'}</span>
          </div>
        </div>
      </div>

      <div class="wp-wrap">
        <div class="wp-labels">
          <div><div class="wp-l">${g.away}</div><div class="wp-p">${awWP}%</div></div>
          <div style="text-align:right"><div class="wp-l">${g.home}</div><div class="wp-p">${hmWP}%</div></div>
        </div>
        <div class="wp-bar">
          <div class="wp-away" style="width:${awWP}%"></div>
        </div>
      </div>

      <div class="edge-row">
        <div>
          <div class="edge-lbl">MODEL EDGE</div>
          <div class="edge-val ${ecls}">${fmtEdge(g.edge_pct)}</div>
        </div>
        <div class="mkt-col">
          <div class="mkt-lbl">MARKET</div>
          <div>${g.away}&nbsp;${fmtOdds(g.aml)} / ${g.home}&nbsp;${fmtOdds(g.hml)}</div>
        </div>
        <div class="model-col">
          <div class="mkt-lbl">MODEL ML</div>
          <div>${g.away}&nbsp;${fmtOdds(g.model_away_ml)} / ${g.home}&nbsp;${fmtOdds(g.model_home_ml)}</div>
        </div>
      </div>

      ${conv!=='PASS'?`
      <div class="pick-row pr-${cc}">
        <div>
          <div class="pk-lbl">BET</div>
          <div class="pk-team">${g.pick||'—'}</div>
          <div class="pk-odds">${fmtOdds(g.pick_odds)}</div>
        </div>
        <div class="pk-stake">
          <div class="pk-stake-lbl">KELLY STAKE</div>
          <div class="pk-stake-amt">$${parseFloat(g.stake||0).toFixed(2)}</div>
        </div>
      </div>`:''}

      ${g.narrative?`<div class="narrative n-${cc}">${g.narrative}</div>`:''}
      ${buildPropTags(g)}
      ${buildMisc(g)}
    </div>
  `;
  return card;
}

function buildPropTags(g) {
  const t=[];
  if (g.nrfi==='yes') t.push('<span class="ptag nrfi">NRFI LEAN</span>');
  if (g.total)        t.push(`<span class="ptag total">O/U ${g.total}</span>`);
  if (g.k_prop)       t.push(`<span class="ptag kprop">K: ${g.k_prop}</span>`);
  return t.length?`<div class="prop-tags">${t.join('')}</div>`:'';
}

function buildMisc(g) {
  const it=[];
  if (g.umpire)          it.push(`<span><span class="misc-lbl">UMP: </span>${g.umpire}${g.umpire_note?' — '+g.umpire_note:''}</span>`);
  if (g.weather_note)    it.push(`<span><span class="misc-lbl">WX: </span>${g.weather_note}</span>`);
  if (g.platoon_note)    it.push(`<span><span class="misc-lbl">PLAT: </span>${g.platoon_note}</span>`);
  if (g.bp_fatigue_note) it.push(`<span><span class="misc-lbl">BP: </span>${g.bp_fatigue_note}</span>`);
  if (g.park_factor)     it.push(`<span><span class="misc-lbl">PARK: </span>${parseFloat(g.park_factor).toFixed(2)}</span>`);
  return it.length?`<div class="misc-row">${it.join('')}</div>`:'';
}

// ── MONITOR ──
function renderMonitor() {
  const div=$('monitor');
  const page=mk('div','page fade-in');
  const alerts=(APP.live||[]).slice().reverse(); // newest first
  const preview=APP.preview;

  // ── Header ──
  const sh=mk('div','sec-hdr');
  const liveCount=alerts.length;
  sh.innerHTML=`<div class="sec-title">LIVE MONITOR</div><div class="sec-meta">${liveCount} alert${liveCount!==1?'s':''} · ${new Date().toLocaleTimeString()}</div>`;
  page.appendChild(sh);

  // ── Daily Preview Section ──
  if (preview && preview.games && preview.games.length) {
    const pvHdr=mk('div','sec-hdr',`<div class="sec-title" style="font-size:10px;color:#888">TODAY'S PREVIEW — ${preview.date||''}</div><div class="sec-meta">${preview.verdict||''}</div>`);
    page.appendChild(pvHdr);

    const pvGrid=mk('div','props-grid');
    pvGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;margin-bottom:18px';
    preview.games.forEach(g=>{
      const conv=g.conviction||'PASS';
      const convCls=conv==='HIGH'?'green':conv==='MEDIUM'?'amber':'dim';
      const card=mk('div','');
      card.style.cssText='background:#0d0d0d;border:1px solid #1a1a1a;border-radius:4px;padding:12px 14px';
      const pickHtml=g.pick?`<div style="margin-top:6px"><span class="badge ${convCls}" style="font-size:8px">${conv}</span> <strong style="color:#e0e0e0">${g.pick}</strong> <span style="color:#666">${g.pick_odds||''}</span></div>`:'';
      const sents=g.sentences||{};
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <span style="color:#e0e0e0;font-weight:700;font-size:11px">${g.away||''} @ ${g.home||''}</span>
          <span style="color:#555;font-size:9px">${g.time||''}</span>
        </div>
        <div style="color:#666;font-size:8px;margin-bottom:6px">${g.sp_line||''}</div>
        ${pickHtml}
        <div style="margin-top:10px">
          ${sents.sp?`<div style="margin-bottom:6px"><div style="color:#888;font-size:7px;letter-spacing:.05em;margin-bottom:2px">SP MATCHUP</div><div style="color:#bbb;font-size:9px;line-height:1.5">${sents.sp}</div></div>`:''}
          ${sents.bullpen?`<div style="margin-bottom:6px"><div style="color:#888;font-size:7px;letter-spacing:.05em;margin-bottom:2px">BULLPEN</div><div style="color:#bbb;font-size:9px;line-height:1.5">${sents.bullpen}</div></div>`:''}
          ${sents.lineup?`<div style="margin-bottom:6px"><div style="color:#888;font-size:7px;letter-spacing:.05em;margin-bottom:2px">LINEUP</div><div style="color:#bbb;font-size:9px;line-height:1.5">${sents.lineup}</div></div>`:''}
          ${sents.park_weather?`<div style="margin-bottom:6px"><div style="color:#888;font-size:7px;letter-spacing:.05em;margin-bottom:2px">PARK / WEATHER</div><div style="color:#bbb;font-size:9px;line-height:1.5">${sents.park_weather}</div></div>`:''}

// ── EDGES ──
function renderEdges() {
  const div=$('edges');
  const page=mk('div','page fade-in');
  const arb=APP.arb||[];
  const latest=[...arb].sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0))[0];

  const seen={};
  arb.forEach(run=>{
    (run.edges||[]).forEach(e=>{
      const key=`${e.game}|${e.team}|${e.alt_label||''}`;
      if (!seen[key]||e.edge_pct>seen[key].edge_pct) seen[key]=e;
    });
  });
  const edges=Object.values(seen).sort((a,b)=>b.edge_pct-a.edge_pct);

  const sh=mk('div','sec-hdr');
  sh.innerHTML=`<div class="sec-title">EDGE FINDER — POLYMARKET vs BOOKS</div><div class="sec-meta">${latest?'Last: '+new Date(latest.timestamp).toLocaleString():'No runs'}</div>`;
  page.appendChild(sh);

  if (latest) {
    const sb=mk('div','session-bar');
    sb.style.marginBottom='14px';
    sb.innerHTML=`
      <span class="badge blue"><span class="dot"></span>${latest.games_found||0} GAMES</span>
      <span class="badge ${(latest.poly_markets||0)>0?'green':'dim'}"><span class="dot"></span>${latest.poly_markets||0} POLY MKTS</span>
      <span class="badge ${(latest.kalshi_markets||0)>0?'amber':'dim'}"><span class="dot"></span>${latest.kalshi_markets||0} KALSHI</span>
      <span class="badge ${edges.length>0?'green':'red'}"><span class="dot"></span>${edges.length} EDGES</span>
    `;
    page.appendChild(sb);
  }

  if (!edges.length) {
    page.appendChild(emptyState('NO EDGES FOUND','No Polymarket vs sportsbook discrepancies detected. Poly markets may not have game-specific lines for today\'s slate.'));
    div.innerHTML=''; div.appendChild(page); return;
  }

  const wrap=mk('div','table-wrap');
  const table=mk('table','dt');
  table.innerHTML=`<thead><tr><th>GAME</th><th>TEAM</th><th>SIDE</th><th>BOOKS %</th><th>POLY %</th><th>EDGE</th><th>SOURCE</th><th>ACTION</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  edges.forEach(e=>{
    const tr=document.createElement('tr');
    const ec=edgeCls(e.edge_pct);

      <td class="gc">${e.game||'—'}</td>
      <td><strong>${e.team||'—'}</strong></td>
      <td>${e.side||'—'}</td>
      <td>${e.us_p!=null?(e.us_p*100).toFixed(1)+'%':'—'}</td>
      <td>${e.alt_p!=null?(e.alt_p*100).toFixed(1)+'%':'—'}</td>
      <td class="ec ${ec}">${e.edge_pct!=null?'+'+parseFloat(e.edge_pct).toFixed(1)+'%':'—'}</td>
      <td><span class="badge blue" style="font-size:7px">${(e.alt_source||'').toUpperCase()}</span></td>
      <td class="ac">${e.action||e.alt_label||'—'}</td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  page.appendChild(wrap);
  div.innerHTML=''; div.appendChild(page);
}

    btn.onclick=()=>switchLog(key);
    ftabs.appendChild(btn);
  });
  page.appendChild(ftabs);

  const jd=mk('div','json-display');
  jd.id='json-display';
  page.appendChild(jd);

function switchLog(key) {
  APP.activeLog=key;
  document.querySelectorAll('.ftab').forEach(b=>{
    b.classList.toggle('active',
      (key==='scout'&&b.textContent.includes('scout'))||
      (key==='arb'  &&b.textContent.includes('arbitrage'))||
      (key==='clv'  &&b.textContent.includes('clv'))||
      (key==='props'&&b.textContent.includes('props'))
    );
  });
  updateLogDisplay();
}

function updateLogDisplay() {
  const el=$('json-display');
  if (!el) return;
  const data=APP.activeLog==='scout'?APP.scout:APP.activeLog==='arb'?APP.arb:APP.activeLog==='clv'?APP.clv:APP.props;
  el.innerHTML=syntaxHL(JSON.stringify(data,null,2));
}

function syntaxHL(json) {
  if (!json) return '<span class="jnull">null</span>';
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
      let c='jn';
      if (/^"/.test(m)) c=/:$/.test(m)?'jk':'js';
      else if (/true|false/.test(m)) c='jb';
      else if (/null/.test(m)) c='jnull';
      return `<span class="${c}">${m}</span>`;
    });
}

function saveBetState() {
  try { localStorage.setItem('parlayos_bets', JSON.stringify(APP.loggedBets)); } catch(_){}

function calcToWin(odds, stake) {
  const n = parseInt(String(odds).replace(/[^\d-]/g,''));
  if (isNaN(n) || n===0) return 0;
  return n>0 ? (n/100)*stake : (100/Math.abs(n))*stake;
}

async function logBet(g, btnEl) {
  const key = `${g.away}@${g.home}`;
  const stake = parseFloat(g.stake)||0;
  btnEl.disabled = true;
  btnEl.textContent = 'LOGGING…';

  const body = {
    bet: g.pick, type: (g.pick||'').includes('F5')?'F5':'ML',
    game: key, sp: g.asp||'', park: g.home||'',
    umpire: g.umpire||'', odds: g.pick_odds,
    model_prob: g.pick_wp, market_prob: g.pick_side==='home'?g.home_market_p:g.away_market_p,
    edge_pct: g.edge_pct, conviction: g.conviction, stake,
  };

  const res = await apiPost('/bet', body);
  if (res && res.ok) {
    APP.loggedBets[key] = { logged:true, result:null, bet:g.pick,
      odds:g.pick_odds, stake, date: new Date().toISOString().slice(0,10) };
    saveBetState();
    renderBetSlip();
  } else {
    btnEl.disabled = false;
    btnEl.textContent = 'LOG BET';
    alert('API error: ' + (res?.error||'Is api.py running at localhost:5000?'));
  }
}

async function resolveBet(g, result) {
  const key = `${g.away}@${g.home}`;
  const state = APP.loggedBets[key];
  if (!state) return;

  const body = {
    bet: state.bet||g.pick, result,
    date: state.date || new Date().toISOString().slice(0,10),
    closing_odds: String(g.pick_odds||''),
    game_score: '', notes: '',
  };

  const res = await apiPost('/resolve', body);
  if (res && res.ok) {
    APP.loggedBets[key].result = result;
    saveBetState();
    // Refresh bankroll
    const br = await apiGet('/bankroll');
    if (br) APP.bankroll = br;
    renderBetSlip();
  } else {
    alert('Resolve error: ' + (res?.error||'Is api.py running?'));
  }
}

function renderBetSlip() {
  const div = $('betslip');
  const page = mk('div','page fade-in');

  const sh = mk('div','sec-hdr');
  sh.innerHTML = `<div class="sec-title">BET SLIP</div>
    <div class="sec-meta">${new Date().toLocaleTimeString()}</div>`;
  page.appendChild(sh);

  // Bankroll header
  const bk = APP.bankroll;
  const cur = bk ? bk.current : APP.START;
  const pnl = cur - APP.START;
  const hdr = mk('div','bs-header');
  hdr.innerHTML = `
    <div>
      <div class="bs-bankroll">$${cur.toFixed(2)}</div>
      <div class="bs-pnl">${pnl>=0?'▲ +':'▼ '}$${Math.abs(pnl).toFixed(2)} vs $${APP.START} start</div>
    </div>
    <div class="bs-api-note">API: ${API}</div>
  `;
  page.appendChild(hdr);

  const s = APP.scout;
  const todayPicks = (s?.games||[]).filter(g=>
    g.conviction!=='PASS' && g.pick && parseFloat(g.stake)>0
  );

  // Pending bets that need resolution
  const pending = todayPicks.filter(g=>{
    const key=`${g.away}@${g.home}`;
    const st = APP.loggedBets[key];
    return st && st.logged && !st.result;
  });

  // Unlogged picks
  const unlogged = todayPicks.filter(g=>{
    const key=`${g.away}@${g.home}`;
    return !APP.loggedBets[key]?.logged;
  });

  // Resolved today
  const resolved = todayPicks.filter(g=>{
    const key=`${g.away}@${g.home}`;
    return APP.loggedBets[key]?.result;
  });

  // ── PICKS TO LOG ──
  if (unlogged.length) {
    const sec = mk('div','slip-section');
    sec.appendChild(mk('div','slip-title',`TODAY'S PICKS — ${s?.date||'—'} (${unlogged.length} to log)`));
    unlogged.forEach(g=>{
      const key=`${g.away}@${g.home}`;
      const stake=parseFloat(g.stake)||0;
      const toWin=calcToWin(g.pick_odds, stake);
      const card=mk('div','slip-card');
      const convCls=g.conviction==='HIGH'?'high':'medium';
      card.innerHTML=`
        <div class="sc-top">
          <span class="conv-badge ${convCls}">${g.conviction}</span>
          <span class="sc-game">${g.away} @ ${g.home}</span>
          <span class="sc-time">${g.time||''}</span>
        </div>
        <div class="sc-row">
          <span class="sc-pick">${g.pick||'—'}</span>
          <span class="sc-odds">${fmtOdds(g.pick_odds)}</span>
          <span class="sc-edge">${fmtEdge(g.edge_pct)}</span>
          <span class="sc-stake">Stake: $${stake.toFixed(2)}</span>
          <span class="sc-towin">To win: +$${toWin.toFixed(2)}</span>
        </div>
        <div class="sc-actions"></div>
      `;
      const btn=mk('button','slip-btn bet-btn','LOG BET');
      btn.onclick=()=>logBet(g, btn);
      card.querySelector('.sc-actions').appendChild(btn);
      sec.appendChild(card);
    });
    page.appendChild(sec);
  }

  // ── PENDING RESOLUTION ──
  if (pending.length) {
    const sec=mk('div','slip-section');
    sec.appendChild(mk('div','slip-title',`PENDING RESULTS (${pending.length} awaiting)`));
    pending.forEach(g=>{
      const key=`${g.away}@${g.home}`;
      const st=APP.loggedBets[key];
      const stake=st.stake||parseFloat(g.stake)||0;
      const toWin=calcToWin(st.odds||g.pick_odds, stake);
      const card=mk('div','slip-card logged');
      card.innerHTML=`
        <div class="sc-top">
          <span class="slip-status logged">LOGGED</span>
          <span class="sc-game">${g.away} @ ${g.home}</span>
          <span class="sc-time">${g.time||''}</span>
        </div>
        <div class="sc-row">
          <span class="sc-pick">${st.bet||g.pick||'—'}</span>
          <span class="sc-odds">${fmtOdds(st.odds||g.pick_odds)}</span>
          <span class="sc-stake">$${stake.toFixed(2)} risked</span>
          <span class="sc-towin">+$${toWin.toFixed(2)} to win</span>
        </div>
        <div class="sc-actions"></div>
      `;
      const acts=card.querySelector('.sc-actions');
      ['W','L','P'].forEach(r=>{
        const cls={'W':'win-btn','L':'loss-btn','P':'push-btn'}[r];
        const lbl={'W':'WIN','L':'LOSS','P':'PUSH'}[r];
        const b=mk('button',`slip-btn ${cls}`,lbl);
        b.onclick=()=>resolveBet(g, r);
        acts.appendChild(b);
      });
      sec.appendChild(card);
    });
    page.appendChild(sec);
  }

  // ── RESOLVED ──
  if (resolved.length) {
    const sec=mk('div','slip-section');
    sec.appendChild(mk('div','slip-title','SETTLED TODAY'));
    resolved.forEach(g=>{
      const key=`${g.away}@${g.home}`;
      const st=APP.loggedBets[key];
      const stake=st.stake||parseFloat(g.stake)||0;
      const result=st.result;
      let pnl=0;
      if (result==='W') pnl=calcToWin(st.odds||g.pick_odds, stake);
      else if (result==='L') pnl=-stake;
      const resCls={'W':'win','L':'loss','P':'push'}[result]||'';
      const resLbl={'W':'WIN','L':'LOSS','P':'PUSH'}[result]||'?';
      const card=mk('div',`slip-card ${result==='W'?'logged':''}`);
      card.innerHTML=`
        <div class="sc-top">
          <span class="slip-status ${resCls}">${resLbl}</span>
          <span class="sc-game">${g.away} @ ${g.home}</span>
          <span class="sc-time">${g.time||''}</span>
        </div>
        <div class="sc-row">
          <span class="sc-pick">${st.bet||g.pick||'—'}</span>
          <span class="sc-odds">${fmtOdds(st.odds||g.pick_odds)}</span>
          <span style="color:${pnl>=0?'var(--green)':'var(--red)'};font-size:11px;font-weight:700">
            ${pnl>=0?'+':''}$${pnl.toFixed(2)}
          </span>
        </div>
      `;
      sec.appendChild(card);
    });
    page.appendChild(sec);
  }

  if (!todayPicks.length) {
    page.appendChild(emptyState(
      'NO PICKS TODAY',
      'Scout found no HIGH or MEDIUM conviction picks. Run scout.py to generate picks.'
    ));
  }

  div.innerHTML=''; div.appendChild(page);
}

// ── TABS ──
function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      tab.classList.add('active');
      const name=tab.dataset.tab;
      $(name).classList.add('active');
      renderTab(name);
    });
  });
}

function renderTab(name) {
  ({today:renderToday,betslip:renderBetSlip,monitor:renderMonitor,edges:renderEdges,
    props:renderProps,clv:renderCLV,bankroll:renderBankroll,log:renderLog})[name]?.();
}

async function doRefresh() {
  const btn=document.querySelector('.refresh-btn');
  if (btn) btn.textContent='↻ LOADING';
  await loadData();
  renderTab(document.querySelector('.tab.active')?.dataset.tab||'today');
  if (btn) btn.textContent='↻ REFRESH';
}

// ── LIVE AUTO-REFRESH (edges tab, 60s) ──
const LIVE_REFRESH_MS = 60_000;
let liveTimer = null;

function isGameHour() {
  const h = new Date().getHours(); // local time — Codespace is ET
  return h >= 18 && h < 23;
}

function updateLiveIndicator(secondsLeft) {
  const el = $('live-indicator');
  if (!el) return;
  if (!isGameHour()) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.textContent = `LIVE — next refresh in ${secondsLeft}s`;
}

async function liveRefreshTick() {
  // Only silently refresh arb data; re-render edges if that tab is active
  try {
    const fresh = await fetch('arbitrage_log.json').then(r=>r.json()).catch(()=>null);
    if (fresh) APP.arb = fresh;
  } catch(_) {}
  const active = document.querySelector('.tab.active')?.dataset.tab;
  if (active === 'edges') renderEdges();
}

function startLiveTimer() {
  if (liveTimer) clearInterval(liveTimer);
  if (!isGameHour()) return;

  let countdown = LIVE_REFRESH_MS / 1000;
  updateLiveIndicator(countdown);

  liveTimer = setInterval(async () => {
    countdown -= 1;
    if (countdown <= 0) {
      countdown = LIVE_REFRESH_MS / 1000;
      await liveRefreshTick();
    }
    updateLiveIndicator(countdown);
    // Stop outside game hours
    if (!isGameHour()) {
      clearInterval(liveTimer);
      liveTimer = null;
      const el = $('live-indicator');
      if (el) el.style.display = 'none';
    }
  }, 1000);
}

async function init() {
  setupTabs();
  await loadData();
  renderToday();
  startLiveTimer();
  // Re-check every 5 min whether game hours started
  setInterval(() => { if (!liveTimer && isGameHour()) startLiveTimer(); }, 300_000);
}

document.addEventListener('DOMContentLoaded',init);
</script>
