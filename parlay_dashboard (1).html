<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARLAY OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050709;--surface:#080b10;--card:#0c1018;--border:#141926;--border2:#1c2333;
    --cyan:#00e5ff;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
    --text:#c8d4e8;--muted:#3d4a65;--dim:#0a0e16;
    --font:'IBM Plex Mono',monospace;--disp:'Bebas Neue',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--disp);font-size:28px;letter-spacing:6px;color:var(--cyan);line-height:1;}
  .header-right{text-align:right;}
  .header-status{font-size:11px;color:var(--cyan);font-weight:700;}
  .header-date{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}

  .container{max-width:1200px;margin:0 auto;padding:20px;}

  .top-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:20px;}
  @media(max-width:800px){.top-grid{grid-template-columns:1fr;}}

  .session-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .verdict-row{display:flex;align-items:center;gap:10px;}
  .verdict-dot{width:10px;height:10px;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
  .verdict-dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
  .verdict-dot.yellow{background:var(--amber);box-shadow:0 0 8px var(--amber);}
  .verdict-dot.red{background:var(--red);box-shadow:0 0 8px var(--red);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .verdict-text{font-family:var(--disp);font-size:22px;letter-spacing:3px;}
  .session-note{font-size:10px;color:var(--muted);max-width:400px;line-height:1.6;}
  .refresh-btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:8px 16px;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
  .refresh-btn:hover{background:var(--cyan);color:#000;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .spin{display:inline-block;animation:spin 1s linear infinite;}

  /* BANKROLL PANEL */
  .bankroll-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .panel-title{font-size:9px;color:var(--cyan);font-weight:700;letter-spacing:2px;margin-bottom:14px;}
  .br-amount{font-family:var(--disp);font-size:36px;color:var(--text);letter-spacing:2px;line-height:1;}
  .br-label{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:12px;}
  .br-pnl{font-size:14px;font-weight:700;margin-bottom:14px;}
  .stakes-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
  .stake-box{background:var(--dim);border:1px solid var(--border);border-radius:7px;padding:8px 10px;text-align:center;}
  .stake-type{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
  .stake-amt{font-family:var(--disp);font-size:20px;color:var(--cyan);}
  .conf-bar-wrap{margin-top:10px;}
  .conf-label{font-size:9px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between;}
  .conf-bar-bg{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;}
  .conf-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));transition:width 0.5s;}

  /* PICKS SUMMARY */
  .picks-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  @media(max-width:600px){.picks-summary{grid-template-columns:1fr;}}
  .picks-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .picks-label{font-size:9px;font-weight:700;letter-spacing:2px;margin-bottom:8px;}
  .picks-label.lock{color:var(--blue);}
  .picks-label.cf{color:var(--amber);}
  .picks-label.pass{color:var(--red);}
  .pick-tag{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;margin:2px 2px 2px 0;}
  .pick-tag.lock{background:#04102a;color:var(--blue);border:1px solid #1a3a6a;}
  .pick-tag.cf{background:#1a0e00;color:var(--amber);border:1px solid #3a2200;}
  .pick-tag.pass{background:#150606;color:var(--red);border:1px solid #3a0a0a;}
  .pick-tag.empty{color:var(--muted);font-size:9px;}

  /* PARLAY */
  .parlay-box{background:#040c1e;border:1px solid #1a3a6a;border-radius:10px;padding:14px;margin-bottom:20px;}
  .parlay-label{font-size:9px;color:var(--blue);font-weight:700;letter-spacing:2px;margin-bottom:8px;}
  .parlay-legs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .parlay-leg{background:#08182e;border:1px solid #1a3a6a;color:var(--text);padding:4px 10px;border-radius:6px;font-size:11px;}
  .parlay-odds{font-family:var(--disp);font-size:28px;color:var(--cyan);letter-spacing:2px;}
  .parlay-payout{font-size:10px;color:var(--muted);margin-top:2px;}

  /* CLV STRIP */
  .clv-strip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;gap:30px;align-items:center;flex-wrap:wrap;}
  .clv-stat{text-align:center;}
  .clv-val{font-family:var(--disp);font-size:24px;letter-spacing:1px;}
  .clv-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;margin-top:1px;}

  /* GAMES GRID */
  .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
  @media(max-width:600px){.games-grid{grid-template-columns:1fr;}}

  /* GAME CARD */
  .game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp 0.3s ease forwards;}
  .game-card.lock{border-left:3px solid var(--blue);}
  .game-card.cf{border-left:3px solid var(--amber);}
  .game-card.pass{border-left:3px solid var(--border2);opacity:0.7;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .card-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
  .matchup-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .team-name{font-size:18px;font-weight:700;font-family:var(--disp);letter-spacing:1px;}
  .team-name.anchor{color:var(--green);}
  .team-name.fade{color:var(--red);}
  .team-name.neutral{color:var(--text);}
  .at-sign{color:var(--muted);font-size:14px;margin:0 4px;}
  .game-time{font-size:9px;color:var(--muted);letter-spacing:1px;}
  .records{font-size:9px;color:var(--muted);margin-top:2px;}
  .score-badge{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .score-num{font-family:var(--disp);font-size:36px;line-height:1;letter-spacing:1px;}
  .score-label{font-size:8px;color:var(--muted);letter-spacing:1px;}
  .score-tag{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:1.5px;}
  .score-tag.lock{background:#04102a;color:var(--blue);border:1px solid #1a3a6a;}
  .score-tag.cf{background:#1a0e00;color:var(--amber);border:1px solid #3a2200;}
  .score-tag.pass{background:var(--dim);color:var(--muted);border:1px solid var(--border);}
  .score-bar-wrap{position:relative;margin-top:8px;}
  .score-bar-bg{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;}
  .score-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}
  .score-bar-marker{position:absolute;top:-3px;left:70%;width:2px;height:10px;background:var(--green);opacity:0.6;}

  .card-body{padding:12px 16px;}
  .sp-row{display:flex;gap:8px;margin-bottom:12px;}
  .sp-box{flex:1;background:var(--dim);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
  .sp-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
  .sp-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sp-era{font-size:10px;margin-top:2px;}
  .odds-row{display:flex;gap:8px;margin-bottom:12px;}
  .odds-box{flex:1;background:var(--dim);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--border);}
  .odds-side{font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
  .odds-num{font-size:20px;font-weight:700;}
  .odds-num.pos{color:var(--green);}
  .odds-num.neg{color:var(--text);}
  .odds-impl{font-size:9px;color:var(--muted);margin-top:1px;}
  .pick-card{border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
  .pick-card.lock{background:#040e1e;border:1px solid #1a3a6a;}
  .pick-card.cf{background:#1a0e00;border:1px solid #3a2200;}
  .pick-info{flex:1;}
  .pick-label{font-size:9px;letter-spacing:1.5px;font-weight:700;margin-bottom:2px;}
  .pick-label.lock{color:var(--cyan);}
  .pick-label.cf{color:var(--amber);}
  .pick-name{font-size:13px;font-weight:700;}
  .pick-math{text-align:right;}
  .pick-ev{font-size:14px;font-weight:700;}
  .pick-edge{font-size:9px;color:var(--muted);}
  .bet-types{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .bet-type-tag{padding:3px 9px;border-radius:6px;font-size:9px;font-weight:700;border:1px solid;}
  .bet-type-tag.f5{background:#04102a;color:var(--blue);border-color:#1a3a6a;}
  .bet-type-tag.nrfi{background:#061510;color:var(--green);border-color:#1a3a1a;}
  .bet-type-tag.kprop{background:#150d00;color:var(--amber);border-color:#3a2a00;}
  .bet-type-tag.total{background:#0a0a1a;color:#a78bfa;border-color:#2a1a4a;}
  .analysis{font-size:10px;color:var(--text);line-height:1.7;margin-bottom:8px;padding:8px 10px;background:var(--dim);border-radius:7px;border-left:2px solid var(--border2);}
  .edges-risks{display:flex;flex-direction:column;gap:3px;}
  .edge-item{font-size:10px;color:var(--text);padding-left:10px;border-left:2px solid var(--green);}
  .risk-item{font-size:10px;color:var(--muted);padding-left:10px;border-left:2px solid var(--amber);}
  .card-footer{padding:8px 16px;background:var(--dim);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .clv-timing{font-size:9px;color:var(--muted);}
  .clv-timing span{color:var(--cyan);font-weight:700;}

  .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:16px;}
  .empty-title{font-family:var(--disp);font-size:24px;letter-spacing:3px;margin-bottom:8px;color:var(--text);}
  .empty-sub{font-size:11px;line-height:1.7;}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
  .loading-spinner{font-size:36px;animation:spin 1s linear infinite;}
  .loading-text{font-size:11px;color:var(--muted);}
  .error-banner{background:#150606;border:1px solid #3a0a0a;border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:11px;color:var(--red);line-height:1.7;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">PARLAY OS</div>
    <div class="header-date" id="headerDate">Loading...</div>
  </div>
  <div class="header-right">
    <div class="header-status">$100 SESSION · KALSHI · MLB 2026</div>
    <div class="header-date" id="lastUpdated">—</div>
  </div>
</div>

<div class="container">
  <div id="mainContent">
    <div class="loading">
      <div class="loading-spinner">⟳</div>
      <div class="loading-text">Loading today's scout data...</div>
    </div>
  </div>
</div>

<script>
const GITHUB_USER = "ahow1";
const GITHUB_REPO = "parlay-os";
const SCOUT_URL   = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/last_scout.json`;
const BR_URL      = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/bankroll.json`;
const CLV_URL     = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/clv_log.json`;

const impliedProb = ml => {
  const n = parseFloat(ml);
  if (!n || isNaN(n)) return null;
  return n > 0 ? 100/(n+100) : Math.abs(n)/(Math.abs(n)+100);
};
const decToAmer = d => d >= 2 ? `+${Math.round((d-1)*100)}` : `${Math.round(-100/(d-1))}`;
const parlayOdds = mls => {
  const vals = mls.map(ml => {
    const n = parseFloat(ml);
    if (!n||isNaN(n)) return null;
    return n > 0 ? n/100+1 : 100/Math.abs(n)+1;
  }).filter(Boolean);
  if (vals.length < 2) return null;
  const d = vals.reduce((a,b)=>a*b,1);
  return {dec:d.toFixed(3), amer:decToAmer(d), payout25:((d-1)*25).toFixed(2), payout15:((d-1)*15).toFixed(2)};
};
const scoreColor = s => s>=70?'#22c55e':s>=50?'#3b82f6':s>=35?'#f59e0b':'#ef4444';
const scoreTag   = s => s>=70?'lock':s>=50?'cf':'pass';
const scoreLabel = s => s>=70?'LOCK':s>=50?'COIN FLIP':'PASS';
const eraColor   = e => { const n=parseFloat(e); return n<2.5?'#22c55e':n<3.5?'#00e5ff':n<5?'#f59e0b':'#ef4444'; };

const teamClass = t => {
  const up = (t||'').toUpperCase();
  return ['ATL','NYY','LAD','PHI','MIL'].includes(up)?'anchor':['SEA','CLE','SD','PIT','CWS','HOU','COL','WAS','NYM','BOS','MIN'].includes(up)?'fade':'neutral';
};

async function fetchJSON(url) {
  const res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function calcCLVStats(log) {
  const resolved = (log||[]).filter(b => b.closing_odds && b.bet_odds && ['W','L','P'].includes(b.result));
  if (!resolved.length) return null;
  const clvs = resolved.map(b => {
    const bp = impliedProb(b.bet_odds), cp = impliedProb(b.closing_odds);
    if (!bp||!cp) return null;
    return ((bp-cp)/cp*100);
  }).filter(v=>v!==null);
  const wins = resolved.filter(b=>b.result==='W').length;
  const avg  = clvs.length ? clvs.reduce((a,b)=>a+b,0)/clvs.length : 0;
  let units  = 0;
  resolved.forEach(b => {
    const n = parseFloat(b.bet_odds);
    const d = n > 0 ? n/100+1 : 100/Math.abs(n)+1;
    if (b.result==='W') units += d-1;
    else if (b.result==='L') units -= 1;
  });
  return {
    total: resolved.length,
    wins, losses: resolved.filter(b=>b.result==='L').length,
    avg_clv: avg.toFixed(2),
    win_rate: resolved.length ? (wins/resolved.length*100).toFixed(1) : 0,
    units_net: units.toFixed(2),
    verdict: avg > 2 ? 'SHARP — proven edge' : avg > 0 ? 'POSITIVE — beating market' : avg > -1 ? 'NEUTRAL' : 'NEGATIVE — model needs work'
  };
}

function renderBankroll(br, clvStats) {
  if (!br) return '';
  const current  = br.current || 100;
  const starting = br.starting || 100;
  const pnl      = (current - starting).toFixed(2);
  const pnlColor = pnl >= 0 ? '#22c55e' : '#ef4444';
  const sessions  = br.sessions || 0;
  const conf      = br.model_confidence || 7;

  return `
    <div class="bankroll-panel">
      <div class="panel-title">BANKROLL STATUS</div>
      <div class="br-amount">$${current.toFixed(2)}</div>
      <div class="br-label">CURRENT BANKROLL · ${sessions} SESSIONS</div>
      <div class="br-pnl" style="color:${pnlColor}">${pnl>=0?'+':''}$${pnl} all-time</div>
      <div class="stakes-grid">
        <div class="stake-box"><div class="stake-type">SHARP</div><div class="stake-amt">$${br.stake_sharp||35}</div></div>
        <div class="stake-box"><div class="stake-type">VALUE</div><div class="stake-amt">$${br.stake_value||22}</div></div>
        <div class="stake-box"><div class="stake-type">PROP</div><div class="stake-amt">$${br.stake_prop||16}</div></div>
        <div class="stake-box"><div class="stake-type">PARLAY</div><div class="stake-amt">$${br.stake_parlay||14}</div></div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-label"><span>MODEL CONFIDENCE</span><span style="color:var(--cyan)">${conf}/10</span></div>
        <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${conf*10}%"></div></div>
      </div>
    </div>`;
}

function render(data, br, clvLog) {
  const main     = document.getElementById('mainContent');
  const games    = data.games || [];
  const locks    = data.locks || [];
  const cfs      = data.coinflips || [];
  const passes   = data.passes || [];
  const verdict  = data.verdict || '';
  const clvStats = calcCLVStats(clvLog);
  const vType    = verdict.includes('FULL')||verdict.includes('GREEN')?'green':verdict.includes('REDUCED')||verdict.includes('YELLOW')?'yellow':'red';
  const vColor   = vType==='green'?'var(--green)':vType==='yellow'?'var(--amber)':'var(--red)';

  let html = '';

  // Top grid — session bar + bankroll
  html += `<div class="top-grid">`;

  // Session bar
  html += `<div class="session-bar">
    <div>
      <div class="verdict-row">
        <div class="verdict-dot ${vType}"></div>
        <div class="verdict-text" style="color:${vColor}">${verdict||'SESSION'}</div>
      </div>
      <div class="session-note" style="margin-top:8px">${data.session_note||data.note||''}</div>
    </div>
    <button class="refresh-btn" onclick="loadData()"><span id="refreshIcon">⟳</span> REFRESH</button>
  </div>`;

  // Bankroll panel
  html += renderBankroll(br, clvStats);

  html += `</div>`; // end top-grid

  // CLV strip
  if (clvStats && clvStats.total > 0) {
    const clvColor = clvStats.avg_clv > 2 ? '#22c55e' : clvStats.avg_clv > 0 ? '#3b82f6' : '#ef4444';
    html += `<div class="clv-strip">
      <div class="clv-stat"><div class="clv-val" style="color:${clvColor}">${clvStats.avg_clv>0?'+':''}${clvStats.avg_clv}%</div><div class="clv-lbl">AVG CLV</div></div>
      <div class="clv-stat"><div class="clv-val">${clvStats.total}</div><div class="clv-lbl">BETS TRACKED</div></div>
      <div class="clv-stat"><div class="clv-val">${clvStats.win_rate}%</div><div class="clv-lbl">WIN RATE</div></div>
      <div class="clv-stat"><div class="clv-val" style="color:${clvStats.units_net>=0?'#22c55e':'#ef4444'}">${clvStats.units_net>=0?'+':''}${clvStats.units_net}u</div><div class="clv-lbl">NET UNITS</div></div>
      <div style="font-size:10px;color:var(--muted);margin-left:auto">${clvStats.verdict}</div>
    </div>`;
  }

  // Picks summary
  html += `<div class="picks-summary">
    <div class="picks-box">
      <div class="picks-label lock">LOCKS</div>
      ${locks.length ? locks.map(l=>`<span class="pick-tag lock">${l}</span>`).join('') : '<span class="pick-tag empty">None tonight</span>'}
    </div>
    <div class="picks-box">
      <div class="picks-label cf">COIN FLIPS</div>
      ${cfs.length ? cfs.map(l=>`<span class="pick-tag cf">${l}</span>`).join('') : '<span class="pick-tag empty">None tonight</span>'}
    </div>
    <div class="picks-box">
      <div class="picks-label pass">PASSING</div>
      ${passes.length ? passes.map(l=>`<span class="pick-tag pass">${l}</span>`).join('') : '<span class="pick-tag empty">Nothing to pass</span>'}
    </div>
  </div>`;

  // Parlay
  const legs = data.parlay_legs || [];
  if (legs.length >= 2) {
    const legOdds = legs.map(l=>l.split(' ').pop());
    const pc = parlayOdds(legOdds);
    html += `<div class="parlay-box">
      <div class="parlay-label">PARLAY BUILD</div>
      <div class="parlay-legs">${legs.map(l=>`<span class="parlay-leg">${l}</span>`).join('')}</div>
      ${pc ? `<div class="parlay-odds">${pc.amer}</div><div class="parlay-payout">+$${pc.payout15} on $15 · +$${pc.payout25} on $25</div>` : `<div class="parlay-odds">${data.parlay_odds||'?'}</div>`}
    </div>`;
  }

  // Games
  html += `<div class="games-grid">`;
  if (!games.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">⚾</div>
      <div class="empty-title">NO GAMES YET</div>
      <div class="empty-sub">Bot runs automatically at 1PM ET.<br>Hit REFRESH or trigger manually in GitHub Actions.</div>
    </div>`;
  }

  games.forEach((g, i) => {
    const score = g.score || 0;
    const tag   = (g.tag||'').toLowerCase().includes('lock')?'lock':(g.tag||'').toLowerCase().includes('cf')||(g.tag||'').toLowerCase().includes('coin')?'cf':'pass';
    const sc    = scoreColor(score);
    const ap    = impliedProb(g.aml), hp = impliedProb(g.hml);
    const tc    = teamClass(g.away), hc = teamClass(g.home);
    const po    = g.pick_odds || '';
    const isAway = g.away && g.pick && g.pick.includes(g.away);
    const opp   = isAway ? g.hml : g.aml;

    let evHtml = '';
    if (po && opp) {
      const pIp = impliedProb(po), oIp = impliedProb(opp);
      if (pIp && oIp) {
        const total = pIp + oIp, tp = pIp/total*100;
        const dec = parseFloat(po)>0?parseFloat(po)/100+1:100/Math.abs(parseFloat(po))+1;
        const ev  = (tp/100*(dec-1)-(1-tp/100))*100;
        const edge = tp - pIp;
        evHtml = `<div class="pick-math">
          <div class="pick-ev" style="color:${ev>=0?'#22c55e':'#ef4444'}">${ev>=0?'+':''}$${ev.toFixed(0)}</div>
          <div class="pick-edge" style="color:${edge>=0?'#22c55e':'#ef4444'}">${edge>=0?'+':''}${edge.toFixed(1)}% edge</div>
        </div>`;
      }
    }

    html += `<div class="game-card ${tag}" style="animation-delay:${i*0.05}s">
      <div class="card-header">
        <div class="matchup-row">
          <div>
            <div style="display:flex;align-items:center">
              <span class="team-name ${tc}">${g.away||'?'}</span>
              <span class="at-sign">@</span>
              <span class="team-name ${hc}">${g.home||'?'}</span>
            </div>
            <div class="game-time">${g.time||''}</div>
            <div class="records">${g.away} ${g.away_record||''} · ${g.home} ${g.home_record||''}</div>
          </div>
          <div class="score-badge">
            <div class="score-num" style="color:${sc}">${score}</div>
            <div class="score-label">/ 100</div>
            <div class="score-tag ${tag}">${scoreLabel(score)}</div>
          </div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${score}%;background:${sc}"></div></div>
          <div class="score-bar-marker"></div>
        </div>
      </div>
      <div class="card-body">
        <div class="sp-row">
          <div class="sp-box">
            <div class="sp-label">AWAY SP</div>
            <div class="sp-name">${g.asp||'TBA'}</div>
            ${g.asp_era?`<div class="sp-era" style="color:${eraColor(g.asp_era)}">ERA ${g.asp_era}</div>`:''}
          </div>
          <div class="sp-box">
            <div class="sp-label">HOME SP</div>
            <div class="sp-name">${g.hsp||'TBA'}</div>
            ${g.hsp_era?`<div class="sp-era" style="color:${eraColor(g.hsp_era)}">ERA ${g.hsp_era}</div>`:''}
          </div>
        </div>
        ${(g.aml||g.hml)?`<div class="odds-row">
          <div class="odds-box">
            <div class="odds-side">AWAY</div>
            <div class="odds-num ${parseFloat(g.aml)>0?'pos':'neg'}">${g.aml||'—'}</div>
            ${ap?`<div class="odds-impl">${(ap*100).toFixed(1)}% impl.</div>`:''}
          </div>
          <div class="odds-box">
            <div class="odds-side">HOME</div>
            <div class="odds-num ${parseFloat(g.hml)>0?'pos':'neg'}">${g.hml||'—'}</div>
            ${hp?`<div class="odds-impl">${(hp*100).toFixed(1)}% impl.</div>`:''}
          </div>
        </div>`:''}
        ${g.pick&&tag!=='pass'?`<div class="pick-card ${tag}">
          <div style="font-size:18px">🎯</div>
          <div class="pick-info">
            <div class="pick-label ${tag}">${tag==='lock'?'LOCK PLAY':'COIN FLIP'}</div>
            <div class="pick-name">${g.pick} ${po}</div>
          </div>
          ${evHtml}
        </div>`:''}
        <div class="bet-types">
          ${g.f5_pick?`<span class="bet-type-tag f5">F5: ${g.f5_pick}</span>`:''}
          ${g.nrfi==='yes'&&g.nrfi_odds?`<span class="bet-type-tag nrfi">NRFI ${g.nrfi_odds}</span>`:''}
          ${g.k_prop?`<span class="bet-type-tag kprop">K: ${g.k_prop}</span>`:''}
          ${g.total?`<span class="bet-type-tag total">${g.total}</span>`:''}
        </div>
        ${g.analysis?`<div class="analysis">${g.analysis}</div>`:''}
        <div class="edges-risks">
          ${g.edge1?`<div class="edge-item">+ ${g.edge1}</div>`:''}
          ${g.risk1?`<div class="risk-item">! ${g.risk1}</div>`:''}
        </div>
      </div>
      <div class="card-footer">
        <div class="clv-timing">TIMING: <span>${g.clv_timing||'STANDARD'}</span></div>
        <div style="font-size:9px;color:var(--muted)">${g.time||''}</div>
      </div>
    </div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

async function loadData() {
  const icon = document.getElementById('refreshIcon');
  if (icon) icon.classList.add('spin');
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

  try {
    const [data, br, clvLog] = await Promise.allSettled([fetchJSON(SCOUT_URL), fetchJSON(BR_URL), fetchJSON(CLV_URL)]);
    const scoutData = data.status==='fulfilled' ? data.value : null;
    const brData    = br.status==='fulfilled' ? br.value : null;
    const clvData   = clvLog.status==='fulfilled' ? clvLog.value : [];

    if (!scoutData) throw new Error('Could not load scout data. Make sure last_scout.json exists in your repo.');

    render(scoutData, brData, clvData);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `<div class="error-banner">
      Could not load data.<br><br>
      <strong>Error:</strong> ${err.message}<br><br>
      Make sure GitHub Actions has run and last_scout.json exists in your repo root.<br>
      Go to GitHub > Actions > MLB Mega Scout > Run workflow to generate fresh data.
    </div>`;
  }
  if (icon) icon.classList.remove('spin');
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
